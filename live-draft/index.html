<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commissioner cinccity · Live Draft Lottery</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --orange:#E8621A;--orange2:#F08030;--sunset:#F5A623;
    --red:#C0181A;--teal:#00A89C;--teal2:#00C8BC;--teal-dark:#005f5a;
    --navy:#0d1a2b;--navy2:#0a1520;--chrome:#d0d8e0;--chrome2:#f0f4f8;
    --text:#f0ede8;--muted:#7a9ab0;
    --border-teal:rgba(0,168,156,0.35);--border-orange:rgba(232,98,26,0.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy2);color:var(--text);font-family:'Teko',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* BG */
  .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .bg-sunset{position:absolute;inset:0;background:linear-gradient(180deg,#0d1a2b 0%,#0d2040 20%,#1a3a5c 45%,#2a4a2a 60%,#3a2a0a 75%,#1a0a08 100%);}
  .wave-layer{position:absolute;bottom:0;left:0;width:200%;height:45%;}
  .wave1{animation:waveMove1 8s linear infinite;opacity:0.6;}
  .wave2{animation:waveMove2 12s linear infinite;opacity:0.4;bottom:2%;}
  .wave3{animation:waveMove3 6s linear infinite;opacity:0.3;bottom:-2%;}
  @keyframes waveMove1{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes waveMove2{from{transform:translateX(-50%)}to{transform:translateX(0)}}
  @keyframes waveMove3{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .glow-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
  .orb-orange{width:500px;height:300px;background:rgba(232,98,26,0.12);top:30%;left:50%;transform:translateX(-50%);}
  .orb-teal{width:400px;height:400px;background:rgba(0,168,156,0.08);bottom:-100px;left:-100px;}
  .orb-teal2{width:300px;height:300px;background:rgba(0,168,156,0.06);bottom:-50px;right:-50px;}
  .frame-line-top,.frame-line-bottom{position:fixed;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),var(--orange),var(--sunset),var(--orange),var(--red));z-index:100;}
  .frame-line-top{top:0;}.frame-line-bottom{bottom:0;}

  .container{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:20px 16px 70px;}

  /* HEADER */
  header{text-align:center;padding:28px 0 18px;margin-bottom:20px;position:relative;}
  .header-border{position:absolute;bottom:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--orange),var(--teal),var(--red),transparent);}
  .commissioner-line{font-size:12px;letter-spacing:5px;color:var(--teal2);text-transform:uppercase;margin-bottom:4px;}
  header h1{font-family:'Anton',sans-serif;font-size:clamp(36px,10vw,72px);letter-spacing:2px;line-height:0.88;background:linear-gradient(160deg,var(--chrome2),var(--chrome),#a0aab4,var(--chrome),var(--chrome2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-sub{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:8px;}
  .header-sub-line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--orange));}
  .header-sub-line.right{background:linear-gradient(90deg,var(--orange),transparent);}
  .header-sub span{font-size:13px;letter-spacing:4px;color:var(--orange2);text-transform:uppercase;font-weight:600;}

  /* LEAGUE TABS */
  .league-tabs{display:flex;gap:8px;margin-bottom:20px;}
  .league-tab{flex:1;padding:11px;background:rgba(10,21,32,0.85);border:1px solid var(--border-orange);border-radius:3px;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:3px;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.2s;}
  .league-tab.active{border-color:var(--teal);color:var(--teal2);background:rgba(0,168,156,0.08);}

  /* LIVE BADGE */
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(192,24,26,0.15);border:1px solid rgba(192,24,26,0.4);border-radius:2px;padding:4px 10px;font-size:11px;letter-spacing:3px;color:#ff6060;text-transform:uppercase;font-family:'Barlow',sans-serif;margin-bottom:16px;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:#ff4040;animation:livePulse 1s infinite;}
  @keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

  /* COUNTDOWN */
  .countdown-wrap{background:rgba(10,21,32,0.9);border:1px solid var(--border-teal);border-top:3px solid var(--teal);border-radius:4px;padding:20px;text-align:center;margin-bottom:20px;backdrop-filter:blur(10px);}
  .countdown-label{font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;font-family:'Barlow',sans-serif;}
  .countdown-pick{font-family:'Anton',sans-serif;font-size:14px;letter-spacing:4px;color:var(--orange2);margin-bottom:12px;}
  .countdown-timer{display:flex;align-items:center;justify-content:center;gap:8px;}
  .countdown-unit{text-align:center;}
  .countdown-num{font-family:'Anton',sans-serif;font-size:clamp(32px,8vw,52px);line-height:1;background:linear-gradient(135deg,var(--chrome2),var(--chrome));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .countdown-unit-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-family:'Barlow',sans-serif;}
  .countdown-sep{font-family:'Anton',sans-serif;font-size:36px;color:var(--border-teal);margin-bottom:12px;}
  .countdown-date{font-size:12px;color:var(--muted);letter-spacing:2px;font-family:'Barlow',sans-serif;margin-top:8px;}

  /* SCHEDULE STRIP */
  .schedule-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;-ms-overflow-style:none;scrollbar-width:none;}
  .schedule-strip::-webkit-scrollbar{display:none;}
  .schedule-day{flex-shrink:0;background:rgba(10,21,32,0.8);border:1px solid var(--border-teal);border-radius:3px;padding:8px 10px;text-align:center;min-width:60px;}
  .schedule-day.today{border-color:var(--orange);background:rgba(232,98,26,0.08);}
  .schedule-day.done{border-color:var(--teal-dark);opacity:0.6;}
  .schedule-day.upcoming{opacity:0.5;}
  .schedule-day-date{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:'Barlow',sans-serif;}
  .schedule-day-pick{font-family:'Anton',sans-serif;font-size:16px;color:var(--chrome);letter-spacing:1px;}
  .schedule-day.done .schedule-day-pick{color:var(--teal2);}
  .schedule-day.today .schedule-day-pick{color:var(--orange2);}
  .schedule-day-check{font-size:12px;color:var(--teal2);margin-top:2px;}

  /* REVEAL ZONE */
  .reveal-zone{background:rgba(8,18,28,0.9);border:2px solid var(--border-teal);border-top:3px solid var(--teal);border-radius:3px;padding:30px 20px;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:18px;backdrop-filter:blur(10px);}
  .reveal-zone::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--teal-dark),var(--teal2),var(--teal-dark));}
  .waiting-state{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .trophy-icon{font-size:48px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(0,168,156,0.4));}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
  .waiting-text{font-size:13px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;}
  .spinning-name{font-family:'Anton',sans-serif;font-size:36px;letter-spacing:3px;color:var(--teal2);animation:spinPulse 0.12s infinite;}
  @keyframes spinPulse{0%,100%{opacity:0.4}50%{opacity:1}}
  .revealed-state{display:none;flex-direction:column;align-items:center;gap:6px;animation:revealIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;}
  @keyframes revealIn{from{opacity:0;transform:scale(0.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .reveal-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--teal);filter:drop-shadow(0 0 16px rgba(0,168,156,0.5));}
  .reveal-avatar-ph{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.08);border:3px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:24px;font-family:'Anton',sans-serif;color:var(--muted);}
  .reveal-pick-label{font-size:12px;letter-spacing:4px;color:var(--teal2);text-transform:uppercase;}
  .reveal-team-name{font-family:'Anton',sans-serif;font-size:clamp(30px,8vw,56px);letter-spacing:2px;line-height:1;background:linear-gradient(135deg,var(--chrome2),var(--chrome),#a0aab4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
  .reveal-traded{font-size:12px;color:var(--orange2);letter-spacing:1px;font-family:'Barlow',sans-serif;}
  .reveal-traded strong{color:#fff;}
  .reveal-odds{font-size:14px;color:var(--orange2);letter-spacing:2px;}
  .confetti-burst{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .cp{position:absolute;width:7px;height:7px;border-radius:1px;animation:cfFall 1.3s ease-out forwards;}
  @keyframes cfFall{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--tx),140px) rotate(420deg);opacity:0}}

  /* COMMISSIONER DRAW BUTTON */
  .btn-draw{width:100%;padding:18px;background:transparent;border:2px solid var(--orange);border-radius:3px;color:var(--orange2);font-family:'Anton',sans-serif;font-size:22px;letter-spacing:5px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;margin-bottom:22px;}
  .btn-draw::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red),var(--orange));transform:translateX(-101%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);z-index:0;}
  .btn-draw:hover::before{transform:translateX(0);}
  .btn-draw:hover{color:#fff;}
  .btn-draw span{position:relative;z-index:1;}
  .btn-draw:disabled{border-color:#333;color:#444;cursor:not-allowed;}
  .btn-draw:disabled::before{display:none;}

  /* RESULTS LOG */
  .results-section h3{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:5px;color:var(--teal);margin-bottom:12px;border-bottom:1px solid var(--border-teal);padding-bottom:8px;}
  .results-list{display:flex;flex-direction:column;gap:6px;}
  .result-row{display:flex;align-items:center;gap:10px;background:rgba(8,18,28,0.8);border:1px solid var(--border-teal);border-left:3px solid var(--teal);border-radius:3px;padding:10px 12px;backdrop-filter:blur(6px);}
  .result-row.animate{animation:slideIn 0.4s ease forwards;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
  .result-pick-num{font-family:'Anton',sans-serif;font-size:26px;background:linear-gradient(135deg,var(--orange2),var(--sunset));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;width:28px;flex-shrink:0;text-align:center;}
  .result-divider{width:1px;height:36px;background:var(--border-teal);flex-shrink:0;}
  .result-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--border-teal);flex-shrink:0;}
  .result-avatar-ph{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Anton',sans-serif;color:var(--muted);flex-shrink:0;}
  .result-info{flex:1;min-width:0;}
  .result-team{font-family:'Anton',sans-serif;font-size:17px;letter-spacing:1px;color:var(--chrome);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result-traded-line{font-size:10px;color:var(--orange2);font-family:'Barlow',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result-meta{font-family:'Barlow',sans-serif;font-size:11px;color:var(--muted);text-align:right;line-height:1.5;flex-shrink:0;}
  .result-meta .odds-highlight{color:var(--teal2);}
  .result-date{font-size:10px;color:var(--teal-dark);font-family:'Barlow',sans-serif;}

  /* COMMISSIONER PANEL */
  .commissioner-panel{background:rgba(10,21,32,0.9);border:1px solid var(--border-orange);border-top:3px solid var(--red);border-radius:3px;padding:16px;margin-bottom:20px;backdrop-filter:blur(10px);}
  .commissioner-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:3px;color:var(--orange2);text-transform:uppercase;font-family:'Barlow',sans-serif;margin-bottom:12px;}
  .commissioner-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--orange2);}

  /* PIN MODAL */
  .pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:center;justify-content:center;}
  .pin-box{background:var(--navy);border:1px solid var(--border-orange);border-top:3px solid var(--red);border-radius:4px;padding:28px;width:90%;max-width:340px;text-align:center;}
  .pin-title{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:3px;color:var(--chrome2);margin-bottom:6px;}
  .pin-sub{font-size:13px;color:var(--muted);font-family:'Barlow',sans-serif;margin-bottom:20px;letter-spacing:1px;}
  .pin-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border-orange);border-radius:3px;padding:12px;color:var(--text);font-family:'Teko',sans-serif;font-size:24px;letter-spacing:8px;text-align:center;outline:none;margin-bottom:12px;}
  .pin-input:focus{border-color:var(--orange);}
  .pin-error{font-size:12px;color:var(--red);font-family:'Barlow',sans-serif;margin-bottom:10px;min-height:16px;}
  .btn-pin{width:100%;padding:13px;background:linear-gradient(135deg,var(--red),var(--orange));border:none;border-radius:3px;color:#fff;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:4px;cursor:pointer;}
  .btn-commissioner-toggle{font-size:12px;color:var(--muted);letter-spacing:2px;text-align:center;cursor:pointer;margin-top:16px;font-family:'Barlow',sans-serif;text-decoration:underline;display:block;}

  /* COMPLETE BANNER */
  .complete-banner{text-align:center;padding:28px;background:rgba(8,18,28,0.9);border:2px solid var(--orange);border-top:4px solid var(--red);border-radius:3px;margin-bottom:20px;}
  .complete-banner h2{font-family:'Anton',sans-serif;font-size:38px;letter-spacing:4px;background:linear-gradient(135deg,var(--orange2),var(--sunset));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .complete-banner p{font-size:13px;color:var(--muted);letter-spacing:1px;margin-top:6px;font-family:'Barlow',sans-serif;}

  /* NAV */
  .nav-back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-family:'Teko',sans-serif;font-size:14px;letter-spacing:3px;text-decoration:none;text-transform:uppercase;padding:8px 0;margin-bottom:8px;transition:color 0.2s;}
  .nav-back:hover{color:var(--teal2);}

  .loading-wrap{text-align:center;padding:40px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border-teal);border-top-color:var(--teal2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
</style>
<style>
.pick-slot-card{background:rgba(10,21,32,0.85);border:1px solid var(--border-teal);border-radius:4px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:all 0.3s;}
.pick-slot-card.revealed{border-color:var(--teal);background:rgba(0,168,156,0.08);}
.pick-slot-card.hidden-pick{opacity:0.4;}
.pick-num{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:1px;color:var(--muted);width:44px;flex-shrink:0;text-align:center;}
.pick-slot-card.revealed .pick-num{color:var(--orange2);}
.pick-divider{width:2px;height:44px;background:var(--border-teal);flex-shrink:0;border-radius:1px;}
.pick-slot-card.revealed .pick-divider{background:var(--teal);}
.pick-team-info{flex:1;}
.pick-team-name{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:2px;color:var(--chrome2);}
.pick-team-sub{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;margin-top:2px;}
.pick-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--teal);flex-shrink:0;}
.pick-avatar-ph{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid var(--border-teal);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:16px;color:var(--muted);flex-shrink:0;}
.pick-hidden-label{font-family:'Barlow',sans-serif;font-size:12px;color:var(--muted);letter-spacing:2px;font-style:italic;}
.btn-run-lottery{width:100%;padding:16px;background:linear-gradient(135deg,rgba(0,168,156,0.2),rgba(0,168,156,0.1));border:2px solid var(--teal);border-radius:4px;color:var(--teal2);font-family:'Anton',sans-serif;font-size:20px;letter-spacing:4px;cursor:pointer;margin-bottom:10px;}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-sunset"></div>
  <svg class="wave-layer wave1" viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,80 C120,20 240,140 360,80 C480,20 600,140 720,80 C840,20 960,140 1080,80 C1200,20 1320,140 1440,80 L1440,200 L0,200 Z" fill="#00A89C" opacity="0.25"/>
    <path d="M0,100 C180,40 360,160 540,100 C720,40 900,160 1080,100 C1260,40 1440,160 1440,100 L1440,200 L0,200 Z" fill="#005f5a" opacity="0.3"/>
  </svg>
  <svg class="wave-layer wave2" viewBox="0 0 1440 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,60 C90,120 180,20 360,70 C540,120 630,10 720,60 C810,110 990,20 1080,70 C1170,120 1350,30 1440,60 L1440,180 L0,180 Z" fill="#007a74" opacity="0.2"/>
  </svg>
  <div class="glow-orb orb-orange"></div>
  <div class="glow-orb orb-teal"></div>
</div>
<div class="frame-line-top"></div>
<div class="frame-line-bottom"></div>

<!-- PIN OVERLAY -->
<div id="pin-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:400;align-items:center;justify-content:center;">
  <div style="background:#0d1a2b;border:1px solid var(--border-teal);border-top:3px solid var(--teal);border-radius:8px;padding:32px;text-align:center;width:300px;">
    <div style="font-family:'Anton',sans-serif;font-size:20px;letter-spacing:4px;color:var(--chrome2);margin-bottom:20px;">COMMISSIONER PIN</div>
    <input id="pin-input" type="password" maxlength="8"
      style="width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--border-teal);border-radius:3px;color:var(--chrome2);font-family:'Anton',sans-serif;font-size:24px;letter-spacing:8px;text-align:center;outline:none;"
      placeholder="••••••••">
    <div id="pin-error" style="color:#ff6060;font-size:12px;font-family:'Barlow',sans-serif;letter-spacing:1px;margin-top:8px;min-height:16px;"></div>
    <button onclick="submitPin()" style="margin-top:16px;width:100%;padding:12px;background:var(--teal-dark);border:1px solid var(--teal);border-radius:3px;color:var(--chrome2);font-family:'Anton',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;">ENTER</button>
  </div>
</div>

<!-- LOTTERY RUN SPIN OVERLAY -->
<div id="spin-overlay" style="display:none;position:fixed;inset:0;background:rgba(10,21,32,0.97);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
  <div style="font-size:11px;letter-spacing:5px;color:var(--teal2);font-family:'Barlow',sans-serif;text-transform:uppercase;">Running Lottery</div>
  <div id="spin-text" style="font-family:'Anton',sans-serif;font-size:clamp(32px,10vw,64px);letter-spacing:2px;color:var(--chrome2);text-align:center;padding:0 20px;">&#9679;</div>
  <div style="font-size:12px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:2px;">Generating all picks secretly...</div>
</div>

<!-- REVEAL SPIN OVERLAY -->

async function loadPicks() {

    .order('pick_slot', { ascending: false });

async function saveAllPicks(picks) {
  showError('');
  const rows = picks.map(p => ({
    league: activeLeague,
    pick_slot: p.pick,
    seed: p.seed,
    team_name: p.team,

    odds: p.odds,

    traded_to_display: p.tradedToDisplay || null,

    drawn_at: new Date().toISOString(),
    revealed: false,

    .upsert(rows, { onConflict: 'league,pick_slot' });
  if (error) { showError('Save error: ' + error.message); return false; }
  return true;
}

async function revealPick(pickSlot) {

}

function subscribeRealtime() {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb
    .channel('live_' + activeLeague + '_' + Date.now())
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'lottery_results',
      filter: 'league=eq.' + activeLeague

      renderAll();
    })
    .subscribe();
}

// ── LOTTERY ───────────────────────────────────────────────────────────────────
function generateAllPicks() {
  let pool = [1,2,3,4,5,6,7,8];
  const results = [];
  const config = LEAGUE_CONFIG[activeLeague];
  for (let slot = 1; slot <= 8; slot++) {
    const eligible = pool.filter(s => (ODDS_TABLE[s][slot] || 0) > 0);
    if (eligible.length === 0) continue;
    const w = pool.map(s => ODDS_TABLE[s][slot] || 0);
    const total = w.reduce((a,b) => a+b, 0);
    let winner = eligible[eligible.length - 1];
    if (total > 0) {
      let r = Math.random() * total;
      for (let i=0; i<pool.length; i++) { r -= w[i]; if (r <= 0) { winner = pool[i]; break; } }
      if ((ODDS_TABLE[winner][slot] || 0) === 0) winner = eligible[Math.floor(Math.random() * eligible.length)];
    }
    const seedConfig = config.seeds.find(s => s.seed === winner);
    const username = seedConfig ? seedConfig.username : '';
    const tradedTo = seedConfig ? seedConfig.tradedTo : null;
    const td = TEAM_DATA[activeLeague][username] || { displayName: username, avatarUrl: null };
    const tradedToDisplay = tradedTo ? ((TEAM_DATA[activeLeague][tradedTo] || {}).displayName || tradedTo) : null;
    results.push({ pick: slot, seed: winner, team: td.displayName, username, avatarUrl: td.avatarUrl, odds: ODDS_TABLE[winner][slot] || 0, tradedTo, tradedToDisplay });
    pool = pool.filter(s => s !== winner);
  }
  return results;
}

async function runLottery() {
  if (animating) return;
  if (allPicks.length > 0) {
    if (!confirm('Lottery already run for ' + activeLeague + '. Reset and run again?')) return;
    await sb.from('lottery_results').delete().eq('league', activeLeague);
  }
  animating = true;

  const spinOverlay = document.getElementById('spin-overlay');
  const spinText = document.getElementById('spin-text');
  if (spinOverlay) spinOverlay.style.display = 'flex';

  const allNames = LEAGUE_CONFIG[activeLeague].seeds
    .map(s => (TEAM_DATA[activeLeague][s.username] || { displayName: s.username }).displayName.toUpperCase());

  let spins = 0;
  await new Promise(resolve => {
    const iv = setInterval(() => {
      if (spinText) spinText.textContent = allNames[Math.floor(Math.random() * allNames.length)];
      spins++;
      if (spins >= 25) { clearInterval(iv); resolve(); }
    }, 70);
  });

  if (spinOverlay) spinOverlay.style.display = 'none';

  const picks = generateAllPicks();
  const saved = await saveAllPicks(picks);
  if (!saved) { animating = false; return; }

  await loadPicks();
  animating = false;
  renderAll();
}

async function revealSlot(slot) {

  if (label) label.textContent = 'Revealing Pick 1.0' + slot;

  const hiddenNames = allPicks
    .filter(p => !p.revealed)
    .map(p => (TEAM_DATA[activeLeague][p.username] || { displayName: p.team_name }).displayName.toUpperCase());

  const spinNames = hiddenNames.length > 0 ? hiddenNames : ['...'];

  await new Promise(resolve => {
    const iv = setInterval(() => {
      if (spinText) spinText.textContent = spinNames[Math.floor(Math.random() * spinNames.length)];
      spins++;
      if (spins >= 25) { clearInterval(iv); resolve(); }
    }, 75);
  });

  const td = TEAM_DATA[activeLeague][pick.username] || { displayName: pick.team_name };
  if (spinText) spinText.textContent = td.displayName.toUpperCase();
  await new Promise(r => setTimeout(r, 1000));
  if (overlay) overlay.style.display = 'none';

  const ok = await revealPick(slot);
  if (!ok) { animating = false; return; }

  await loadPicks();
  animating = false;
  renderAll();
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function getNextRevealInfo() {
  const revealedSlots = allPicks.filter(p => p.revealed).map(p => Number(p.pick_slot));
  const remaining = SCHEDULE.filter(s => !revealedSlots.includes(s.slot));
  if (remaining.length === 0) return null;
  return remaining.sort((a,b) => b.slot - a.slot)[0];
}

function startCountdown(targetDate) {
  if (countdownInterval) clearInterval(countdownInterval);
  updateCountdown(targetDate);
  countdownInterval = setInterval(() => updateCountdown(targetDate), 1000);
}

function updateCountdown(targetDate) {
  const el = document.getElementById('countdown-timer');
  if (!el) return;
  const diff = targetDate - new Date();
  if (diff <= 0) {
    clearInterval(countdownInterval);
    el.innerHTML = '<div class="countdown-num" style="color:var(--teal2);font-size:28px;letter-spacing:2px;">REVEAL TIME!</div>';
    return;
  }
  const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000),
        m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
  el.innerHTML = (d>0?'<div class="countdown-unit"><div class="countdown-num">'+d+'</div><div class="countdown-unit-label">Days</div></div><div class="countdown-sep">:</div>':'') +
    '<div class="countdown-unit"><div class="countdown-num">'+String(h).padStart(2,'0')+'</div><div class="countdown-unit-label">Hours</div></div><div class="countdown-sep">:</div>'+
    '<div class="countdown-unit"><div class="countdown-num">'+String(m).padStart(2,'0')+'</div><div class="countdown-unit-label">Min</div></div><div class="countdown-sep">:</div>'+
    '<div class="countdown-unit"><div class="countdown-num">'+String(s).padStart(2,'0')+'</div><div class="countdown-unit-label">Sec</div></div>';
}

  const lotteryRun = allPicks.length === 8;
  const revealedPicks = allPicks.filter(p => p.revealed);
  const hiddenPicks = allPicks.filter(p => !p.revealed);
  const allDone = revealedPicks.length === 8;
  const nextReveal = getNextRevealInfo();

  // Schedule strip
  const stripEl = document.getElementById('schedule-strip');
  if (stripEl) {
    const revealedSlots = revealedPicks.map(p => Number(p.pick_slot));

      const done = revealedSlots.includes(s.slot);

      html += '<div class="schedule-day ' + cls + '"><div class="schedule-day-date">' + s.label + '</div><div class="schedule-day-pick">1.0' + s.slot + '</div><div class="schedule-day-check">' + (done?'✓':isNext?'●':'') + '</div></div>';
    });
    html += '</div>';
    stripEl.innerHTML = html;
  }

  // Countdown
  const countdownEl = document.getElementById('countdown-area');
  if (countdownEl) {
    if (allDone) {
      countdownEl.innerHTML = '<div class="complete-banner"><h2>LOTTERY COMPLETE</h2><p>All 8 picks have been revealed. Good luck this season.</p></div>';
    } else if (nextReveal && lotteryRun) {
      const drawTime = new Date(nextReveal.date + 'T21:30:00Z');
      countdownEl.innerHTML = '<div class="countdown-wrap"><div class="countdown-label">Next Pick Reveal</div><div class="countdown-pick">PICK 1.0' + nextReveal.slot + ' &middot; ' + nextReveal.label + ' at 5:30 PM ET</div><div class="countdown-timer" id="countdown-timer"></div><div class="countdown-date">Tune in live to see who gets Pick 1.0' + nextReveal.slot + '</div></div>';
      setTimeout(() => startCountdown(drawTime), 0);
    } else if (!lotteryRun) {
      countdownEl.innerHTML = '<div class="countdown-wrap"><div class="countdown-label">Lottery Status</div><div class="countdown-pick" style="color:var(--muted);">Commissioner has not yet run the lottery</div></div>';
    }
  }

  // Commissioner panel
  const commEl = document.getElementById('commissioner-panel');
  if (commEl) {
    if (!isCommissioner) {
      commEl.innerHTML = '';
    } else {
      let html = '<div class="commissioner-panel"><div class="commissioner-badge"><div class="commissioner-badge-dot"></div>Commissioner Mode</div>';
      if (!lotteryRun) {
        html += '<button class="btn-run-lottery" onclick="runLottery()">&#9654; RUN LOTTERY &amp; GENERATE ALL PICKS</button>';
        html += '<div style="font-size:11px;color:var(--muted);font-family:Barlow,sans-serif;letter-spacing:1px;text-align:center;margin-bottom:8px;">Picks are saved secretly · Reveal each pick on its scheduled day</div>';
      } else if (!allDone) {
        const unrevealed = [...hiddenPicks].sort((a,b) => Number(b.pick_slot)-Number(a.pick_slot));
        html += '<div style="font-size:10px;letter-spacing:2px;color:var(--orange2);font-family:Barlow,sans-serif;text-transform:uppercase;margin-bottom:8px;">Reveal a pick:</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;">';
        unrevealed.forEach(p => {
          html += '<button onclick="revealSlot(' + p.pick_slot + ')" class="btn-draw" style="flex:0 0 auto;width:auto;padding:10px 18px;font-size:15px;letter-spacing:3px;">REVEAL 1.0' + p.pick_slot + '</button>';
        });
        html += '</div>';
      } else {
        html += '<div style="font-size:13px;color:var(--teal2);font-family:Barlow,sans-serif;letter-spacing:1px;margin-bottom:12px;text-align:center;">&#10003; All 8 picks revealed!</div>';

      html += '</div>';
      commEl.innerHTML = html;
    }
    const toggle = document.getElementById('commissioner-toggle');
    if (toggle) toggle.style.display = isCommissioner ? 'none' : 'block';
  }

  // Most recent reveal zone
  const revealEl = document.getElementById('reveal-zone');
  if (revealEl) {
    if (revealedPicks.length === 0) {
      revealEl.innerHTML = '<div class="waiting-state"><div class="trophy-icon">&#127942;</div><div class="waiting-text">Awaiting first pick reveal</div></div>';
    } else {
      // Most recently revealed = highest drawn_at among revealed picks
      const recent = [...revealedPicks].sort((a,b) => new Date(b.drawn_at)-new Date(a.drawn_at))[0];
      const td = TEAM_DATA[activeLeague][recent.username] || { displayName: recent.team_name, avatarUrl: null };
      const avatarUrl = td.avatarUrl || recent.avatar_url;
      revealEl.innerHTML = '<div class="revealed-state" style="display:flex;">' +
        (avatarUrl?'<img class="reveal-avatar" crossorigin="anonymous" src="'+avatarUrl+'" onerror="this.style.display=\'none\'">':'<div class="reveal-avatar-ph">'+(recent.team_name||'?')[0]+'</div>') +
        '<div class="reveal-pick-label">PICK 1.0'+recent.pick_slot+' &middot; MOST RECENT</div>' +
        '<div class="reveal-team-name">'+(recent.team_name||'').toUpperCase()+'</div>' +
        (recent.traded_to?'<div class="reveal-traded">Pick traded to &middot; <strong>'+((recent.traded_to_display||recent.traded_to)||'').toUpperCase()+'</strong></div>':'') +
        '<div class="reveal-odds">'+parseFloat(recent.odds||0).toFixed(1)+'% odds to land this pick</div>' +
        '</div>';
    }
  }

  // Draft board
  const boardEl = document.getElementById('draft-board');
  if (boardEl && lotteryRun) {
    let html = '<div class="results-section"><h3>Draft Board</h3><div>';
    for (let slot = 8; slot >= 1; slot--) {
      const pick = allPicks.find(p => Number(p.pick_slot) === slot);
      if (!pick) continue;
      if (pick.revealed) {
        const td = TEAM_DATA[activeLeague][pick.username] || { displayName: pick.team_name, avatarUrl: null };
        const avatarUrl = td.avatarUrl || pick.avatar_url;
        html += '<div class="pick-slot-card revealed">' +
          '<div class="pick-num">1.0'+slot+'</div><div class="pick-divider"></div>' +
          (avatarUrl?'<img class="pick-avatar" crossorigin="anonymous" src="'+avatarUrl+'" onerror="this.style.display=\'none\'">':'<div class="pick-avatar-ph">'+(pick.team_name||'?')[0]+'</div>') +
          '<div class="pick-team-info"><div class="pick-team-name">'+(pick.team_name||'').toUpperCase()+'</div>' +
          '<div class="pick-team-sub">Seed '+pick.seed+' &middot; '+parseFloat(pick.odds||0).toFixed(1)+'% odds'+(pick.traded_to?' &middot; &#8644; '+(pick.traded_to_display||pick.traded_to):'')+' &middot; Revealed '+new Date(pick.drawn_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})+
          '</div></div></div>';
      } else {
        const schedDay = SCHEDULE.find(s => s.slot === slot);
        html += '<div class="pick-slot-card hidden-pick">' +
          '<div class="pick-num" style="color:var(--border-teal);">1.0'+slot+'</div><div class="pick-divider"></div>' +
          '<div class="pick-avatar-ph" style="border-color:rgba(255,255,255,0.05);">?</div>' +
          '<div class="pick-team-info"><div class="pick-hidden-label">Reveals '+( schedDay ? schedDay.label + ' at 5:30 PM ET' : 'TBD' )+'</div></div>' +
          '</div>';
      }
    }
    html += '</div></div>';
    boardEl.innerHTML = html;
  } else if (boardEl) {
    boardEl.innerHTML = '';
  }
}

// ── PIN ───────────────────────────────────────────────────────────────────────
function showPinModal() {
  document.getElementById('pin-overlay').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
}

function submitPin() {
  const val = document.getElementById('pin-input').value;
  if (val === COMMISSIONER_PIN) {
    isCommissioner = true;
    document.getElementById('pin-overlay').style.display = 'none';
    renderAll();
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN';
    document.getElementById('pin-input').value = '';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('pin-overlay').style.display !== 'none') submitPin();
});

async function init() {
  await loadPicks();
  subscribeRealtime();
  renderAll();
}

init();
</script>
