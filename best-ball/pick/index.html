<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your Roster · Best Ball Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@300;400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --orange:#E8621A;--orange2:#F08030;--sunset:#F5A623;
  --red:#C0181A;--teal:#00A89C;--teal2:#00C8BC;--teal-dark:#005f5a;
  --navy:#0d1a2b;--navy2:#0a1520;--chrome:#d0d8e0;--chrome2:#f0f4f8;
  --text:#f0ede8;--muted:#7a9ab0;--gold:#F5A623;
  --border-teal:rgba(0,168,156,0.35);--green:#22c55e;--red2:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--navy2);color:var(--text);font-family:'Teko',sans-serif;min-height:100vh;}
.bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#060e18,#0a1520);}
.frame-line{position:fixed;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--orange),var(--teal));z-index:100;}
.frame-line-top{top:0;}.frame-line-bottom{bottom:0;}
.layout{position:relative;z-index:2;display:grid;grid-template-columns:1fr 290px;min-height:100vh;}
@media(max-width:680px){.layout{grid-template-columns:1fr;}.roster-sidebar{position:fixed;bottom:0;left:0;right:0;height:auto;max-height:42vh;overflow-y:auto;border-top:2px solid var(--teal);border-radius:0;z-index:50;}}

/* LEFT */
.pick-panel{padding:14px 18px 100px;border-right:1px solid rgba(255,255,255,0.05);overflow-y:auto;max-height:100vh;position:sticky;top:0;}
.nav-back{color:var(--muted);font-family:'Barlow',sans-serif;font-size:12px;letter-spacing:2px;text-decoration:none;}
.nav-back:hover{color:var(--teal2);}
.pick-title{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:2px;color:var(--chrome2);margin:10px 0 2px;}
.contest-label{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:2px;margin-bottom:14px;}

/* BUDGET BAR */
.budget-bar{background:rgba(10,21,32,0.9);border:1px solid var(--border-teal);border-radius:4px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.budget-label{font-size:10px;letter-spacing:3px;color:var(--muted);font-family:'Barlow',sans-serif;text-transform:uppercase;}
.budget-coins{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:1px;}
.budget-coins.ok{color:var(--gold);}
.budget-coins.warning{color:var(--orange2);}
.budget-coins.over{color:var(--red2);}
.budget-track{flex:1;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.budget-fill{height:100%;border-radius:3px;transition:width 0.3s,background 0.3s;}

/* POS TABS */
.pos-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.pos-tabs::-webkit-scrollbar{display:none;}
.pos-tab{flex-shrink:0;padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:3px;font-family:'Anton',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);cursor:pointer;transition:all 0.15s;position:relative;}
.pos-tab.active{border-color:var(--teal);color:var(--teal2);background:rgba(0,168,156,0.1);}
.pos-tab .badge{position:absolute;top:-5px;right:-5px;background:var(--teal);color:#fff;font-size:8px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow',sans-serif;font-weight:600;}
.pos-tab .badge.full{background:var(--green);}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,0.05);border:1px solid var(--border-teal);border-radius:3px;color:var(--chrome2);font-family:'Barlow',sans-serif;font-size:14px;outline:none;}
.search-input:focus{border-color:var(--teal2);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}

/* PLAYER LIST */
.player-list{display:flex;flex-direction:column;gap:3px;}
.player-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:3px;cursor:pointer;transition:all 0.12s;}
.player-row:hover{background:rgba(0,168,156,0.07);border-color:var(--border-teal);}
.player-row.selected{background:rgba(0,168,156,0.1);border-color:var(--teal);pointer-events:none;opacity:0.7;}
.player-row.cant-afford{opacity:0.3;pointer-events:none;}
.player-row.slots-full{opacity:0.25;pointer-events:none;}
.player-headshot{width:34px;height:34px;border-radius:50%;object-fit:cover;background:rgba(255,255,255,0.06);flex-shrink:0;}
.player-name{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--chrome2);}
.player-meta{font-size:10px;color:var(--muted);letter-spacing:1px;}
.player-info{flex:1;min-width:0;}
.salary-tag{font-family:'Anton',sans-serif;font-size:13px;color:var(--gold);flex-shrink:0;letter-spacing:1px;}
.salary-tag::before{content:"🪙 ";font-size:10px;}
.player-check{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.selected .player-check{background:var(--teal);border-color:var(--teal);color:#fff;}

/* ROSTER SIDEBAR */
.roster-sidebar{background:#070f1a;border-left:1px solid var(--border-teal);padding:14px;display:flex;flex-direction:column;height:100vh;overflow-y:auto;position:sticky;top:0;}
.roster-title{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:3px;color:var(--chrome2);margin-bottom:3px;}
.roster-sub{font-size:10px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;margin-bottom:12px;}

.roster-slot{display:flex;align-items:center;gap:8px;padding:7px 9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:3px;margin-bottom:4px;min-height:44px;cursor:pointer;}
.roster-slot.filled{background:rgba(0,168,156,0.06);border-color:var(--border-teal);cursor:default;}
.slot-label{font-family:'Anton',sans-serif;font-size:10px;letter-spacing:1px;width:28px;flex-shrink:0;}
.QB .slot-label{color:#e5c440;}.RB .slot-label{color:#4ae0a0;}.WR .slot-label{color:#4ab0ff;}
.TE .slot-label{color:#ff8c4a;}.FLEX .slot-label{color:#c084fc;}.DST .slot-label{color:#f87171;}
.slot-player{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--chrome);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-salary{font-family:'Anton',sans-serif;font-size:11px;color:var(--gold);flex-shrink:0;}
.slot-empty{font-family:'Barlow',sans-serif;font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:1px;flex:1;}
.slot-remove{background:none;border:none;color:rgba(255,255,255,0.15);cursor:pointer;font-size:13px;padding:1px 4px;line-height:1;flex-shrink:0;}
.slot-remove:hover{color:var(--red);}

/* BUDGET SUMMARY */
.budget-summary{background:rgba(0,0,0,0.3);border-radius:3px;padding:8px 10px;margin:8px 0;}
.budget-row{display:flex;justify-content:space-between;font-family:'Barlow',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
.budget-row.total{color:var(--chrome);font-weight:600;border-top:1px solid rgba(255,255,255,0.07);padding-top:4px;margin-top:4px;}
.budget-remaining{font-family:'Anton',sans-serif;font-size:14px;}

.progress-wrap{margin-top:4px;}
.progress-label{display:flex;justify-content:space-between;font-family:'Barlow',sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.progress-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:2px;transition:width 0.3s;}

.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,rgba(0,168,156,0.3),rgba(0,168,156,0.12));border:2px solid var(--teal);border-radius:4px;color:var(--teal2);font-family:'Anton',sans-serif;font-size:15px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;}
.btn-submit:disabled{opacity:0.3;cursor:not-allowed;border-color:rgba(255,255,255,0.1);color:var(--muted);background:none;}
.btn-submit:not(:disabled):hover{background:linear-gradient(135deg,rgba(0,168,156,0.45),rgba(0,168,156,0.25));}
.over-budget-msg{font-size:10px;color:var(--red2);font-family:'Barlow',sans-serif;letter-spacing:1px;text-align:center;margin-top:4px;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#0d1a2b;border:1px solid var(--border-teal);border-top:3px solid var(--teal);border-radius:8px;padding:26px;width:320px;max-width:90vw;}
.modal-title{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:3px;color:var(--chrome2);margin-bottom:6px;}
.modal-sub{font-family:'Barlow',sans-serif;font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5;letter-spacing:0.5px;}
.modal-input{width:100%;padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border-teal);border-radius:3px;color:var(--chrome2);font-family:'Barlow',sans-serif;font-size:14px;outline:none;margin-bottom:7px;}
.modal-input:focus{border-color:var(--teal2);}
.modal-error{font-size:11px;color:#ff8080;font-family:'Barlow',sans-serif;min-height:14px;margin-bottom:8px;}
.btn-modal{width:100%;padding:11px;background:rgba(0,168,156,0.15);border:1px solid var(--teal);border-radius:3px;color:var(--teal2);font-family:'Anton',sans-serif;font-size:15px;letter-spacing:3px;cursor:pointer;}

.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.success-overlay.open{display:flex;}
.success-icon{font-size:56px;}
.success-title{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:4px;color:var(--teal2);}
.success-sub{font-family:'Barlow',sans-serif;font-size:13px;color:var(--muted);letter-spacing:2px;text-align:center;line-height:1.6;}
.btn-success{padding:11px 26px;background:rgba(0,168,156,0.15);border:1px solid var(--teal);border-radius:3px;color:var(--teal2);font-family:'Anton',sans-serif;font-size:15px;letter-spacing:3px;cursor:pointer;margin-top:6px;text-decoration:none;display:inline-block;}

.spinner{width:28px;height:28px;border:3px solid var(--border-teal);border-top-color:var(--teal2);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="frame-line frame-line-top"></div>
<div class="frame-line frame-line-bottom"></div>

<!-- IDENTITY MODAL -->
<div class="modal-overlay" id="identity-modal">
  <div class="modal-box">
    <div class="modal-title">WHO ARE YOU?</div>
    <div class="modal-sub">Enter your Sleeper username and display name to lock in your entry.</div>
    <input class="modal-input" id="username-input" placeholder="Sleeper username" maxlength="40">
    <input class="modal-input" id="displayname-input" placeholder="Display name (optional)">
    <div class="modal-error" id="modal-error"></div>
    <button class="btn-modal" onclick="confirmIdentity()">LOCK IT IN →</button>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="success-overlay">
  <div class="success-icon">✅</div>
  <div class="success-title">YOU'RE IN!</div>
  <div class="success-sub" id="success-sub">Roster locked. Good luck!</div>
  <a href="/best-ball" class="btn-success">VIEW LEADERBOARD →</a>
</div>

<div class="layout">
  <!-- LEFT: PLAYER PICKER -->
  <div class="pick-panel">
    <a href="/best-ball" class="nav-back">‹ Back to Contest</a>
    <div class="pick-title">BUILD YOUR ROSTER</div>
    <div class="contest-label" id="contest-label">Loading contest...</div>

    <!-- Budget bar -->
    <div class="budget-bar">
      <div>
        <div class="budget-label">Budget</div>
        <div class="budget-coins ok" id="budget-display">🪙 50</div>
      </div>
      <div style="flex:1;">
        <div class="budget-track"><div class="budget-fill" id="budget-fill" style="width:0%;background:var(--teal);"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:3px;font-family:'Barlow',sans-serif;font-size:9px;color:var(--muted);">
          <span>SPENT</span><span id="budget-spent-label">0 / 50</span>
        </div>
      </div>
    </div>

    <div class="pos-tabs" id="pos-tabs"></div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" placeholder="Search players..." oninput="renderPlayers()">
    </div>

    <div id="player-list"><div class="spinner"></div></div>
  </div>

  <!-- RIGHT: ROSTER SIDEBAR -->
  <div class="roster-sidebar">
    <div class="roster-title">MY ROSTER</div>
    <div class="roster-sub" id="slots-label">0 / 8 selected</div>
    <div id="roster-slots"></div>

    <div class="budget-summary">
      <div class="budget-row"><span>Budget</span><span>🪙 50</span></div>
      <div class="budget-row"><span>Spent</span><span id="sb-spent">0</span></div>
      <div class="budget-row total"><span>Remaining</span><span class="budget-remaining" id="sb-remaining">50</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span id="progress-text">Select 8 players</span><span id="progress-count">0/8</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <button class="btn-submit" id="submit-btn" disabled onclick="handleSubmit()">SUBMIT ROSTER</button>
      <div class="over-budget-msg" id="over-budget-msg"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vnpsxpofnquntnydcklu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZucHN4cG9mbnF1bnRueWRja2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODQ5MzgsImV4cCI6MjA4OTg2MDkzOH0.ergWPNr6dWBAYQP2S03f5_wOtH2QA03TxaBpOSC9Bj8';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const BUDGET = 50;

// Salary tiers based on search_rank (lower = better player = more expensive)
function getSalary(player) {
  const rank = player.search_rank || 9999;
  const pos = player.position;
  if (pos === 'DEF') return 3; // DST always 3
  if (rank <= 10)  return 15;
  if (rank <= 25)  return 13;
  if (rank <= 50)  return 11;
  if (rank <= 80)  return 9;
  if (rank <= 120) return 7;
  if (rank <= 180) return 5;
  if (rank <= 280) return 4;
  return 3;
}

// Roster config
const ROSTER_CONFIG = [
  { slot:'QB',   positions:['QB'],           label:'QB' },
  { slot:'RB1',  positions:['RB'],           label:'RB' },
  { slot:'RB2',  positions:['RB'],           label:'RB' },
  { slot:'WR1',  positions:['WR'],           label:'WR' },
  { slot:'WR2',  positions:['WR'],           label:'WR' },
  { slot:'TE',   positions:['TE'],           label:'TE' },
  { slot:'FLEX', positions:['RB','WR','TE'], label:'FLEX' },
  { slot:'DST',  positions:['DEF'],          label:'DST' },
];

const POS_TABS = ['QB','RB','WR','TE','FLEX','DST'];

let contestId = null;
let contestData = null;
let playerCache = {};
let selectedPlayers = {};  // slotKey → player
let activePos = 'QB';
let submitting = false;

const params = new URLSearchParams(window.location.search);
contestId = params.get('contest');

// ── HELPERS ──────────────────────────────────────────────────────────────────
function budgetSpent() {
  return Object.values(selectedPlayers).filter(Boolean).reduce((s,p) => s + getSalary(p), 0);
}

function budgetRemaining() { return BUDGET - budgetSpent(); }

function totalSelected() { return Object.values(selectedPlayers).filter(Boolean).length; }

function getSlotCounts() {
  const counts = {};
  ROSTER_CONFIG.forEach(cfg => {
    const key = cfg.label;
    if (!counts[key]) counts[key] = { total:0, filled:0 };
    counts[key].total++;
    if (selectedPlayers[cfg.slot]) counts[key].filled++;
  });
  return counts;
}

function availableSlotFor(positions) {
  for (const cfg of ROSTER_CONFIG) {
    if (!selectedPlayers[cfg.slot] && positions.some(p => cfg.positions.includes(p))) return cfg.slot;
  }
  return null;
}

function isPlayerSelected(pid) {
  return Object.values(selectedPlayers).some(p => p && p.player_id === pid);
}

function positionsForTab(tab) {
  const map = { QB:['QB'], RB:['RB'], WR:['WR'], TE:['TE'], FLEX:['RB','WR','TE'], DST:['DEF'] };
  return map[tab] || [tab];
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function updateBudgetUI() {
  const spent = budgetSpent();
  const remaining = BUDGET - spent;
  const pct = (spent / BUDGET) * 100;

  const display = document.getElementById('budget-display');
  const fill = document.getElementById('budget-fill');
  const spentLabel = document.getElementById('budget-spent-label');
  const sbSpent = document.getElementById('sb-spent');
  const sbRemaining = document.getElementById('sb-remaining');
  const overMsg = document.getElementById('over-budget-msg');

  if (display) {
    display.textContent = '🪙 ' + remaining + ' left';
    display.className = 'budget-coins ' + (remaining < 0 ? 'over' : remaining < 5 ? 'warning' : 'ok');
  }
  if (fill) {
    fill.style.width = Math.min(pct,100) + '%';
    fill.style.background = remaining < 0 ? 'var(--red2)' : remaining < 5 ? 'var(--orange2)' : 'var(--teal)';
  }
  if (spentLabel) spentLabel.textContent = spent + ' / ' + BUDGET;
  if (sbSpent) sbSpent.textContent = '🪙 ' + spent;
  if (sbRemaining) {
    sbRemaining.textContent = '🪙 ' + remaining;
    sbRemaining.style.color = remaining < 0 ? 'var(--red2)' : remaining < 5 ? 'var(--orange2)' : 'var(--gold)';
  }
  if (overMsg) overMsg.textContent = remaining < 0 ? '⚠ Over budget by 🪙' + Math.abs(remaining) : '';
}

function renderPosTabs() {
  const counts = getSlotCounts();
  document.getElementById('pos-tabs').innerHTML = POS_TABS.map(p => {
    const c = counts[p] || { total:1, filled:0 };
    const full = c.filled >= c.total;
    return `<div class="pos-tab ${activePos===p?'active':''}" onclick="switchPos('${p}')">
      ${p}<span class="badge ${full?'full':''}">${c.filled}/${c.total}</span>
    </div>`;
  }).join('');
}

function renderRosterSlots() {
  const total = totalSelected();
  const spent = budgetSpent();
  document.getElementById('slots-label').textContent = total + ' / 8 selected';
  document.getElementById('progress-text').textContent = total < 8 ? `Select ${8-total} more` : 'Roster complete!';
  document.getElementById('progress-count').textContent = total + '/8';
  document.getElementById('progress-fill').style.width = (total/8*100) + '%';
  document.getElementById('submit-btn').disabled = total < 8 || spent > BUDGET || submitting;
  updateBudgetUI();

  document.getElementById('roster-slots').innerHTML = ROSTER_CONFIG.map(cfg => {
    const p = selectedPlayers[cfg.slot];
    const slotClass = cfg.slot.replace(/\d/,'');
    if (p) {
      return `<div class="roster-slot filled ${slotClass}">
        <span class="slot-label">${cfg.label}</span>
        <span class="slot-player">${p.last_name || p.full_name || p.player_name || p.player_id}</span>
        <span class="slot-salary">🪙${getSalary(p)}</span>
        <button class="slot-remove" onclick="removePlayer('${cfg.slot}')">✕</button>
      </div>`;
    }
    return `<div class="roster-slot ${slotClass}" onclick="switchPos('${cfg.label.replace(/\d/,'')}')">
      <span class="slot-label">${cfg.label}</span>
      <span class="slot-empty">Select ${cfg.label.replace(/\d/,'')}...</span>
    </div>`;
  }).join('');
}

function renderPlayers() {
  const el = document.getElementById('player-list');
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  const positions = positionsForTab(activePos);
  const filterPos = activePos === 'DST' ? ['DEF'] : positions;

  let players = Object.values(playerCache).filter(p => {
    if (!filterPos.includes(p.position)) return false;
    if (!p.team && p.position !== 'DEF') return false;
    if (search && !`${p.full_name||''} ${p.team||''}`.toLowerCase().includes(search)) return false;
    return true;
  });

  players.sort((a,b) => (a.search_rank||9999)-(b.search_rank||9999));
  players = players.slice(0, 100);

  const remaining = budgetRemaining();
  const slotAvailable = !!availableSlotFor(filterPos);

  if (!players.length) {
    el.innerHTML = '<div style="text-align:center;padding:28px;font-family:Barlow,sans-serif;font-size:13px;color:var(--muted);">No players found</div>';
    return;
  }

  el.innerHTML = '<div class="player-list">' + players.map(p => {
    const pid = p.player_id;
    const salary = getSalary(p);
    const isSelected = isPlayerSelected(pid);
    const cantAfford = !isSelected && salary > remaining;
    const isFull = !isSelected && !slotAvailable;
    const imgSrc = `/api/sleeper?player_img=${pid}`;
    return `<div class="player-row ${isSelected?'selected':''} ${cantAfford&&!isSelected?'cant-afford':''} ${isFull&&!isSelected?'slots-full':''}"
      onclick="${isSelected||cantAfford||isFull?'':'addPlayer(\'' + pid + '\')' }">
      <img class="player-headshot" src="${imgSrc}" onerror="this.src=''">
      <div class="player-info">
        <div class="player-name">${p.full_name||pid}</div>
        <div class="player-meta">${p.team||'FA'} · ${p.position}</div>
      </div>
      <div class="salary-tag">${salary}</div>
      <div class="player-check">${isSelected?'✓':''}</div>
    </div>`;
  }).join('') + '</div>';
}

function switchPos(pos) {
  activePos = pos;
  document.getElementById('search-input').value = '';
  renderPosTabs();
  renderPlayers();
}

function addPlayer(playerId) {
  const player = playerCache[playerId];
  if (!player) return;
  if (getSalary(player) > budgetRemaining()) return;
  const positions = positionsForTab(activePos === 'DST' ? 'DST' : activePos);
  const filterPos = activePos === 'DST' ? ['DEF'] : positionsForTab(activePos);
  const slot = availableSlotFor(filterPos);
  if (!slot) return;
  selectedPlayers[slot] = { ...player, player_id: playerId };
  renderPosTabs();
  renderRosterSlots();
  renderPlayers();

  // Auto-advance to next position that still needs players
  const nextPos = POS_TABS.find(tab => {
    const counts = getSlotCounts();
    const c = counts[tab];
    return c && c.filled < c.total;
  });
  if (nextPos && nextPos !== activePos) switchPos(nextPos);
}

function removePlayer(slot) {
  delete selectedPlayers[slot];
  renderPosTabs();
  renderRosterSlots();
  renderPlayers();
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
function handleSubmit() {
  if (totalSelected() < 8 || budgetSpent() > BUDGET) return;
  const saved = sessionStorage.getItem('bb_username');
  if (saved) {
    submitEntry(saved, sessionStorage.getItem('bb_displayname') || saved);
  } else {
    document.getElementById('identity-modal').classList.add('open');
    setTimeout(() => document.getElementById('username-input').focus(), 80);
  }
}

function confirmIdentity() {
  const username = document.getElementById('username-input').value.trim();
  const displayName = document.getElementById('displayname-input').value.trim() || username;
  if (!username) { document.getElementById('modal-error').textContent = 'Username required'; return; }
  sessionStorage.setItem('bb_username', username);
  sessionStorage.setItem('bb_displayname', displayName);
  document.getElementById('identity-modal').classList.remove('open');
  submitEntry(username, displayName);
}

async function submitEntry(username, displayName) {
  submitting = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'SUBMITTING...';

  const spent = budgetSpent();
  const { data: entryData, error: entryErr } = await sb.from('bb_entries').upsert({
    contest_id: parseInt(contestId),
    username,
    display_name: displayName,
    budget_used: spent,
    total_score: 0,
    best_lineup_score: 0,
    submitted_at: new Date().toISOString(),
  }, { onConflict: 'contest_id,username' }).select();

  if (entryErr) {
    alert('Error: ' + entryErr.message);
    submitting = false;
    renderRosterSlots();
    return;
  }

  const entryId = entryData[0].id;
  await sb.from('bb_roster').delete().eq('entry_id', entryId);

  const rows = Object.entries(selectedPlayers).map(([slot, p]) => ({
    entry_id: entryId,
    player_id: p.player_id,
    player_name: p.full_name || p.player_name || p.player_id,
    position: p.position,
    nfl_team: p.team || '',
    slot,
    salary: getSalary(p),
  }));

  const { error: rostErr } = await sb.from('bb_roster').insert(rows);
  if (rostErr) { alert('Roster error: ' + rostErr.message); submitting = false; return; }

  document.getElementById('success-sub').textContent = displayName + "\u2019s roster is locked in. 🪙" + spent + " spent. Good luck!";
  document.getElementById('success-overlay').classList.add('open');
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadPlayers() {
  const res = await fetch('/api/sleeper?endpoint=players/nfl');
  if (!res.ok) return;
  const data = await res.json();
  const validPos = ['QB','RB','WR','TE','DEF'];
  Object.entries(data).forEach(([id, p]) => {
    if (validPos.includes(p.position) && (p.team || p.position === 'DEF')) {
      playerCache[id] = { ...p, player_id: id };
    }
  });
  renderPlayers();
}

async function loadContest() {
  if (!contestId) return;
  const { data } = await sb.from('bb_contests').select('*').eq('id', contestId).single();
  if (data) {
    contestData = data;
    document.getElementById('contest-label').textContent = data.week_label + ' · 🪙 50 Coin Budget';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('identity-modal').classList.contains('open')) confirmIdentity();
});

async function init() {
  await loadContest();
  renderPosTabs();
  renderRosterSlots();
  loadPlayers();
}

init();
</script>
</body>
