<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commissioner cinccity · League Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:#E8621A;--orange2:#F08030;--sunset:#F5A623;
    --red:#C0181A;--teal:#00A89C;--teal2:#00C8BC;--teal-dark:#005f5a;
    --navy:#0d1a2b;--navy2:#0a1520;--chrome:#d0d8e0;--chrome2:#f0f4f8;
    --text:#f0ede8;--muted:#7a9ab0;
    --border-teal:rgba(0,168,156,0.35);--border-orange:rgba(232,98,26,0.5);--gold:#F5A623;
    --card:rgba(10,21,32,0.9);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--navy2);color:var(--text);font-family:'Teko',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* BG */
  .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .bg-sunset{position:absolute;inset:0;background:linear-gradient(180deg,#0d1a2b 0%,#0d2040 20%,#1a3a5c 45%,#2a4a2a 60%,#3a2a0a 75%,#1a0a08 100%);}
  .wave-layer{position:absolute;bottom:0;left:0;width:200%;height:45%;}
  .wave1{animation:waveMove1 8s linear infinite;opacity:0.6;}
  .wave2{animation:waveMove2 12s linear infinite;opacity:0.4;bottom:2%;}
  @keyframes waveMove1{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @keyframes waveMove2{from{transform:translateX(-50%)}to{transform:translateX(0)}}
  .glow-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
  .orb-orange{width:500px;height:300px;background:rgba(232,98,26,0.12);top:30%;left:50%;transform:translateX(-50%);}
  .orb-teal{width:400px;height:400px;background:rgba(0,168,156,0.08);bottom:-100px;left:-100px;}
  .frame-line-top,.frame-line-bottom{position:fixed;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),var(--orange),var(--sunset),var(--orange),var(--red));z-index:100;}
  .frame-line-top{top:0;}.frame-line-bottom{bottom:0;}

  .container{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:20px 16px 70px;}

  /* HEADER */
  header{text-align:center;padding:28px 0 22px;margin-bottom:24px;position:relative;}
  .header-border{position:absolute;bottom:0;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--red),var(--orange),var(--teal),var(--red),transparent);}
  .commissioner-line{font-size:12px;letter-spacing:5px;color:var(--teal2);text-transform:uppercase;margin-bottom:4px;}
  header h1{font-family:'Anton',sans-serif;font-size:clamp(36px,10vw,72px);letter-spacing:2px;line-height:0.88;background:linear-gradient(160deg,var(--chrome2),var(--chrome),#a0aab4,var(--chrome),var(--chrome2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-sub{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;}
  .header-sub-line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--orange));}
  .header-sub-line.right{background:linear-gradient(90deg,var(--orange),transparent);}
  .header-sub span{font-size:13px;letter-spacing:4px;color:var(--orange2);text-transform:uppercase;font-weight:600;}

  /* LEAGUE TABS */
  .league-tabs{display:flex;gap:8px;margin-bottom:20px;}
  .league-tab{flex:1;padding:12px;background:var(--card);border:1px solid var(--border-orange);border-radius:3px;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:3px;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.2s;}
  .league-tab.active{border-color:var(--teal);color:var(--teal2);background:rgba(0,168,156,0.08);}
  .league-tab:hover{color:var(--text);}

  /* TEAM GRID */
  .section-label{font-family:'Anton',sans-serif;font-size:14px;letter-spacing:5px;color:var(--teal);margin-bottom:12px;text-transform:uppercase;}
  .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:30px;}
  .team-card{background:var(--card);border:1px solid var(--border-teal);border-radius:4px;padding:14px 12px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
  .team-card:hover{border-color:var(--teal2);transform:translateY(-2px);background:rgba(0,168,156,0.06);}
  .team-card-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border-teal);}
  .team-card-avatar-ph{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid var(--border-teal);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:18px;color:var(--muted);}
  .team-card-name{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:1px;color:var(--chrome);line-height:1.2;}
  .team-card-username{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;}

  /* LOADING */
  .loading-wrap{text-align:center;padding:40px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border-teal);border-top-color:var(--teal2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

  /* ── MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#0d1a2b;border:1px solid var(--border-teal);border-top:3px solid var(--teal);border-radius:12px 12px 0 0;width:100%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp 0.35s cubic-bezier(0.16,1,0.3,1);}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

  .modal-header{padding:16px 18px 0;flex-shrink:0;}
  .modal-drag{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 14px;}
  .modal-team-info{display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--border-teal);}
  .modal-avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--teal);flex-shrink:0;}
  .modal-avatar-ph{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:22px;color:var(--muted);flex-shrink:0;}
  .modal-team-name{font-family:'Anton',sans-serif;font-size:clamp(20px,5vw,28px);letter-spacing:2px;color:var(--chrome2);line-height:1;}
  .modal-username{font-size:13px;color:var(--muted);font-family:'Barlow',sans-serif;margin-top:3px;}
  .modal-close{margin-left:auto;width:32px;height:32px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0;transition:all 0.2s;}
  .modal-close:hover{background:rgba(255,255,255,0.12);color:var(--text);}

  /* MODAL TABS */
  .modal-tabs{display:flex;border-bottom:1px solid var(--border-teal);margin:0 18px;flex-shrink:0;}
  .modal-tab{padding:12px 16px;font-family:'Anton',sans-serif;font-size:15px;letter-spacing:3px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;}
  .modal-tab.active{color:var(--teal2);border-bottom-color:var(--teal2);}
  .modal-tab:hover{color:var(--text);}

  /* MODAL BODY */
  .modal-body{flex:1;overflow-y:auto;padding:16px 18px 24px;}
  .modal-body::-webkit-scrollbar{width:4px;}
  .modal-body::-webkit-scrollbar-track{background:transparent;}
  .modal-body::-webkit-scrollbar-thumb{background:var(--border-teal);border-radius:2px;}

  /* TRADE YEAR TABS */
  .trade-year-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border-teal);padding-bottom:0;}
  .trade-year-tab{padding:8px 14px;font-family:'Anton',sans-serif;font-size:14px;letter-spacing:3px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;margin-bottom:-1px;}
  .trade-year-tab.active{color:var(--teal2);border-bottom-color:var(--teal2);}
  .trade-year-tab:hover{color:var(--text);}
  .trade-year-tab.no-trades{opacity:0.35;cursor:default;}
  .trade-year-panel{display:none;}
  .trade-year-panel.active{display:block;}

  /* TRADE LIST */
  .trade-card{background:rgba(255,255,255,0.03);border:1px solid var(--border-teal);border-left:3px solid var(--teal);border-radius:4px;padding:12px 14px;margin-bottom:12px;}
  .trade-date{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;margin-bottom:8px;}
  .trade-parties{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .trade-team-badge{display:flex;align-items:center;gap:6px;background:rgba(0,168,156,0.08);border:1px solid var(--border-teal);border-radius:3px;padding:4px 8px;}
  .trade-team-badge img{width:22px;height:22px;border-radius:50%;object-fit:cover;}
  .trade-team-badge span{font-family:'Teko',sans-serif;font-size:14px;letter-spacing:1px;color:var(--chrome);}
  .trade-vs{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;}
  .trade-section-label{font-size:10px;letter-spacing:2px;color:var(--orange2);text-transform:uppercase;font-family:'Barlow',sans-serif;margin:8px 0 6px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:14px;letter-spacing:1px;}

  /* ── PLAYER TRADING CARDS ── */
  .trade-cards-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}

  .player-card{
    width:72px;flex-shrink:0;
    border-radius:6px;overflow:hidden;
    position:relative;cursor:default;
    box-shadow:0 3px 12px rgba(0,0,0,0.6);
    background:linear-gradient(160deg,#1a2a3a,#0d1520);
    border:1px solid rgba(255,255,255,0.12);
    transition:transform 0.2s,box-shadow 0.2s;
  }
  .player-card:hover{transform:translateY(-3px) rotate(-1deg);box-shadow:0 6px 20px rgba(0,168,156,0.3);}

  /* Holographic shimmer */
  .player-card::before{
    content:'';position:absolute;inset:0;z-index:3;border-radius:6px;
    background:linear-gradient(135deg,
      transparent 20%,
      rgba(255,255,255,0.06) 40%,
      rgba(0,200,188,0.08) 50%,
      rgba(255,255,255,0.04) 60%,
      transparent 80%
    );
    pointer-events:none;
  }

  .player-card-photo{
    width:100%;height:60px;
    background:linear-gradient(180deg,#1e3a5c 0%,#0d2040 60%,#080f1a 100%);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;position:relative;overflow:hidden;
  }
  .player-card-photo::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:20px;
    background:linear-gradient(transparent,rgba(8,15,26,0.9));
  }
  .player-card-photo img{width:100%;height:100%;object-fit:cover;object-position:top;}

  .player-card-body{
    padding:4px 5px 5px;
    background:linear-gradient(180deg,#0d1520,#060e18);
    position:relative;z-index:2;
  }
  .player-card-pos{
    font-family:'Anton',sans-serif;font-size:8px;letter-spacing:2px;
    margin-bottom:1px;text-transform:uppercase;
  }
  .player-card-pos.QB{color:#e5c440;}
  .player-card-pos.RB{color:#4ae0a0;}
  .player-card-pos.WR{color:#4ab0ff;}
  .player-card-pos.TE{color:#ff8c4a;}
  .player-card-pos.K{color:#c084fc;}
  .player-card-pos.DEF{color:#f87171;}
  .player-card-pos.OTHER{color:var(--muted);}
  .player-card-name{
    font-family:'Anton',sans-serif;font-size:9px;letter-spacing:0.5px;
    color:var(--chrome2);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .player-card-team{font-family:'Barlow',sans-serif;font-size:8px;color:var(--muted);margin-top:1px;}

  /* Position color stripe at top */
  .player-card-stripe{height:3px;width:100%;}
  .player-card-stripe.QB{background:linear-gradient(90deg,#e5c440,#f0d060);}
  .player-card-stripe.RB{background:linear-gradient(90deg,#4ae0a0,#00C8BC);}
  .player-card-stripe.WR{background:linear-gradient(90deg,#4ab0ff,#0090ff);}
  .player-card-stripe.TE{background:linear-gradient(90deg,#ff8c4a,#E8621A);}
  .player-card-stripe.K{background:linear-gradient(90deg,#c084fc,#9040e0);}
  .player-card-stripe.DEF{background:linear-gradient(90deg,#f87171,#C0181A);}
  .player-card-stripe.OTHER{background:var(--border-teal);}

  /* ── DRAFT PICK CARDS ── */
  .pick-card{
    width:72px;flex-shrink:0;border-radius:6px;overflow:hidden;
    position:relative;cursor:default;
    box-shadow:0 3px 12px rgba(0,0,0,0.5);
    border:1px solid rgba(245,166,35,0.4);
    transition:transform 0.2s,box-shadow 0.2s;
  }
  .pick-card:hover{transform:translateY(-3px) rotate(1deg);box-shadow:0 6px 20px rgba(245,166,35,0.25);}
  .pick-card-top{
    height:44px;
    background:linear-gradient(160deg,#2a1a00,#1a0f00);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .pick-card-top::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,rgba(245,166,35,0.2),transparent 70%);
  }
  .pick-card-trophy{font-size:18px;line-height:1;position:relative;z-index:1;}
  .pick-card-round-big{
    font-family:'Anton',sans-serif;font-size:11px;letter-spacing:2px;
    color:var(--gold);position:relative;z-index:1;margin-top:2px;
  }
  .pick-card-body{
    padding:4px 5px 5px;
    background:linear-gradient(180deg,#1a1000,#0e0a00);
  }
  .pick-card-season{font-family:'Anton',sans-serif;font-size:14px;color:var(--sunset);letter-spacing:1px;line-height:1;}
  .pick-card-via{font-family:'Barlow',sans-serif;font-size:8px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pick-card-stripe{height:3px;background:linear-gradient(90deg,var(--gold),var(--orange));width:100%;}

  /* DRAFT LIST */
  .draft-pick-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:3px;padding:10px 12px;margin-bottom:6px;}
  .draft-pick-num{font-family:'Anton',sans-serif;font-size:20px;background:linear-gradient(135deg,var(--orange2),var(--sunset));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;width:36px;flex-shrink:0;text-align:center;}
  .draft-pick-info{flex:1;}
  .draft-pick-player{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;color:var(--chrome);}
  .draft-pick-meta{font-size:11px;color:var(--muted);font-family:'Barlow',sans-serif;margin-top:1px;}
  .draft-pick-round{font-size:11px;color:var(--teal2);font-family:'Barlow',sans-serif;letter-spacing:1px;}
  .draft-year-label{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:4px;color:var(--orange2);padding:10px 0 6px;border-bottom:1px solid var(--border-orange);margin-bottom:8px;}

  /* HARDWARE TAB */
  .hardware-empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:'Barlow',sans-serif;font-size:14px;letter-spacing:1px;line-height:1.6;}
  .hardware-empty-icon{font-size:36px;margin-bottom:12px;}
  .hardware-section-label{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:4px;color:var(--gold);padding:10px 0 6px;border-bottom:1px solid rgba(245,166,35,0.3);margin-bottom:12px;text-transform:uppercase;}
  .hardware-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
  .hardware-card{position:relative;border-radius:4px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 2px 12px rgba(0,0,0,0.4);}
  .hardware-card:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 4px 20px rgba(245,166,35,0.2);}
  .hardware-card img{width:100%;display:block;border-radius:4px;}
  .hardware-card-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:6px 4px 4px;text-align:center;font-family:'Anton',sans-serif;font-size:10px;letter-spacing:1px;color:#fff;}
  .hardware-champ-badge{position:absolute;top:6px;right:6px;background:rgba(245,166,35,0.9);color:var(--navy2);font-family:'Anton',sans-serif;font-size:9px;letter-spacing:1px;padding:2px 5px;border-radius:2px;}

  /* lightbox reuse */
  .hw-lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
  .hw-lightbox.open{display:flex;}
  .hw-lightbox-inner{position:relative;max-width:90vw;max-height:90vh;}
  .hw-lightbox-inner img{max-width:88vw;max-height:84vh;object-fit:contain;border-radius:4px;}
  .hw-lightbox-close{position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:15px;}
  .hw-lightbox-close:hover{background:rgba(255,255,255,0.2);}

</style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-sunset"></div>
  <svg class="wave-layer wave1" viewBox="0 0 1440 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,80 C120,20 240,140 360,80 C480,20 600,140 720,80 C840,20 960,140 1080,80 C1200,20 1320,140 1440,80 L1440,200 L0,200 Z" fill="#00A89C" opacity="0.25"/>
    <path d="M0,100 C180,40 360,160 540,100 C720,40 900,160 1080,100 C1260,40 1440,160 1440,100 L1440,200 L0,200 Z" fill="#005f5a" opacity="0.3"/>
  </svg>
  <svg class="wave-layer wave2" viewBox="0 0 1440 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,60 C90,120 180,20 360,70 C540,120 630,10 720,60 C810,110 990,20 1080,70 C1170,120 1350,30 1440,60 L1440,180 L0,180 Z" fill="#007a74" opacity="0.2"/>
  </svg>
  <div class="glow-orb orb-orange"></div>
  <div class="glow-orb orb-teal"></div>
</div>
<div class="frame-line-top"></div>
<div class="frame-line-bottom"></div>

<div class="container">
  <a href="/" style="display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-family:'Teko',sans-serif;font-size:14px;letter-spacing:3px;text-decoration:none;text-transform:uppercase;padding:8px 0;margin-bottom:8px;transition:color 0.2s;" onmouseover="this.style.color='var(--teal2)'" onmouseout="this.style.color='var(--muted)'">‹ Lottery Home</a>
  <header>
    <div class="commissioner-line">Commissioner cinccity</div>
    <h1>LEAGUE HUB</h1>
    <div class="header-sub">
      <div class="header-sub-line"></div>
      <span>Team Profiles</span>
      <div class="header-sub-line right"></div>
    </div>
    <div class="header-border"></div>
  </header>

  <div class="league-tabs">
    <div class="league-tab active" onclick="switchLeague('CFL')">CFL</div>
    <div class="league-tab" onclick="switchLeague('MinuteMaid')">MinuteMaid</div>
    <div class="league-tab" onclick="switchLeague('BIG12')">BIG12</div>
  </div>

  <div id="main-content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Loading teams...</div>
    </div>
  </div>
</div>

<!-- HARDWARE LIGHTBOX -->
<div class="hw-lightbox" id="hw-lightbox" onclick="closeHwLightbox()">
  <div class="hw-lightbox-inner" onclick="event.stopPropagation()">
    <div class="hw-lightbox-close" onclick="closeHwLightbox()">✕</div>
    <img id="hw-lightbox-img" src="" alt="">
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-drag"></div>
      <div class="modal-team-info">
        <img class="modal-avatar" id="modal-avatar" src="" alt="" onerror="this.style.display='none';document.getElementById('modal-avatar-ph').style.display='flex'">
        <div class="modal-avatar-ph" id="modal-avatar-ph" style="display:none">?</div>
        <div>
          <div class="modal-team-name" id="modal-team-name"></div>
          <div class="modal-username" id="modal-username"></div>
        </div>

// ── BIG12 PROJECTION LEADERBOARD ──────────────────────────────────────────────
let projCache = null;
let projPicksCache = null;

async function loadBIG12Projections() {
  const statusEl = document.getElementById('proj-status');
  const boardEl = document.getElementById('proj-leaderboard');
  if (!boardEl) return;

  // Load player cache if needed
  if (Object.keys(playerCache).length === 0) {
    try { const r = await fetch(API('players/nfl')); if (r.ok) { const d = await r.json(); Object.assign(playerCache, d); } } catch {}
  }

  // Fetch all BIG12 startup picks fresh
  const draftId = STARTUP_DRAFT_IDS['BIG12'];
  let allPicks = [];
  try {
    const r = await fetch(API('draft/' + draftId + '/picks'));
    allPicks = r.ok ? await r.json() : [];
  } catch {}

  // Fetch per-player season projections using Sleeper's player projection endpoint
  // /projections/nfl/player/<id>?season=2026&season_type=regular&grouping=season
  if (!projCache) {
    projCache = {};
    const uniquePids = [...new Set(allPicks.map(p => p.player_id))];
    if (statusEl) statusEl.textContent = '· loading projections (' + uniquePids.length + ' players)...';
    // Fetch in batches of 10 to avoid overwhelming the proxy
    const BATCH = 10;
    for (let i = 0; i < uniquePids.length; i += BATCH) {
      const batch = uniquePids.slice(i, i + BATCH);
      await Promise.all(batch.map(async pid => {
        try {
          const res = await fetch(API('projections/nfl/player/' + pid) + '&season=2026&season_type=regular&grouping=season');
          if (res.ok) {
            const data = await res.json();
            // Log the first player's raw response so we can see the structure
            if (pid === uniquePids[0]) {
              console.log('[PROJ] Raw response type:', Array.isArray(data) ? 'array['+data.length+']' : typeof data);
              console.log('[PROJ] Raw response:', JSON.stringify(data).slice(0, 500));
            }
            if (Array.isArray(data)) {
              projCache[pid] = { pts_ppr: data.reduce((s, w) => s + (w.stats?.pts_ppr || w.pts_ppr || 0), 0) };
            } else if (data && data.stats) {
              projCache[pid] = { pts_ppr: data.stats.pts_ppr || 0 };
            } else if (data && typeof data === 'object') {
              // Try every key that might contain pts_ppr
              const flat = Object.values(data).find(v => v && v.pts_ppr);
              projCache[pid] = { pts_ppr: flat ? flat.pts_ppr : (data.pts_ppr || 0) };
            } else {
              projCache[pid] = { pts_ppr: 0 };
            }
          }
        } catch(e) { projCache[pid] = { pts_ppr: 0 }; console.warn('[PROJ] Fetch error for', pid, e.message); }
      }));
    }
    const withPts = Object.values(projCache).filter(p => p.pts_ppr > 0).length;
    console.log('[PROJ] Loaded projections:', withPts, '/', uniquePids.length, 'players with pts_ppr > 0');
    if (withPts > 0) {
      const topEntry = Object.entries(projCache).sort((a,b) => b[1].pts_ppr - a[1].pts_ppr)[0];
      console.log('[PROJ] Top player:', topEntry[0], '→', topEntry[1].pts_ppr, 'pts');
    }
  }

  projPicksCache = allPicks;

  // Group picks by roster_id
  const rosterMap = ROSTER_MAP['BIG12'];
  const byRoster = {};
  Object.keys(rosterMap).forEach(rid => { byRoster[rid] = []; });
  allPicks.forEach(pick => {
    const rid = String(pick.roster_id);
    if (byRoster[rid]) byRoster[rid].push(pick.player_id);
  });

  // pts_ppr direct from Sleeper per-player season projection
  function projScore(pid) {
    const p = projCache[pid];
    if (!p) return 0;
    return Math.round((p.pts_ppr || 0) * 10) / 10;
  }

  // Best lineup optimizer per team
  // Slots: QB×1, WR×2, RB×2, TE×1, FLEX×3(RB/WR/TE), SF×1(QB/any), K×1, DEF×1
  function calcTeamProjection(playerIds) {
    const players = playerIds.map(pid => {
      const cached = playerCache[pid] || {};
      return { pid, pos: cached.position || '', score: projScore(pid) };
    }).sort((a,b) => b.score - a.score);

    const pools = { QB:[], RB:[], WR:[], TE:[], K:[], DEF:[] };
    players.forEach(p => { if (pools[p.pos]) pools[p.pos].push(p); });

    const take = (pos, n) => pools[pos].splice(0,n);

    const starters = [
      ...take('QB',1),
      ...take('WR',2),
      ...take('RB',2),
      ...take('TE',1),
    ];

    // FLEX: best remaining RB/WR/TE
    const flexPool = [...pools.RB,...pools.WR,...pools.TE].sort((a,b)=>b.score-a.score);
    pools.RB=[]; pools.WR=[]; pools.TE=[];
    starters.push(...flexPool.splice(0,3));

    // SF: best remaining QB then flex
    const sfPool = [...pools.QB,...flexPool].sort((a,b)=>b.score-a.score);
    pools.QB=[];
    starters.push(...sfPool.splice(0,1));

    starters.push(...take('K',1));
    starters.push(...take('DEF',1));

    const starterScore = starters.reduce((s,p)=>s+p.score, 0);

    // Bench = everyone not in starters
    const usedPids = new Set(starters.map(p=>p.pid));
    const bench = players.filter(p=>!usedPids.has(p.pid));
    const benchScore = bench.reduce((s,p)=>s+p.score, 0);

    return {
      starterScore: Math.round(starterScore * 10) / 10,
      benchScore: Math.round(benchScore * 10) / 10,
      totalScore: Math.round((starterScore + benchScore) * 10) / 10,
      picks: playerIds.length,
    };
  }

  // Build leaderboard
  const totalRounds = 33;
  const teams = Object.entries(rosterMap).map(([rid, username]) => {
    const pids = byRoster[rid] || [];
    const proj = calcTeamProjection(pids);
    const t = getTeam('BIG12', username);
    return { username, displayName: t.displayName, avatarUrl: t.avatarUrl, ...proj };
  }).sort((a,b) => b.starterScore - a.starterScore);

  const totalPicksMade = allPicks.length;
  const picksPerTeam = Math.floor(totalPicksMade / 12);

  if (statusEl) statusEl.textContent = `· ${totalPicksMade} / ${totalRounds*12} picks made`;

  const POS_COL = { QB:'#e5c440', RB:'#4ae0a0', WR:'#4ab0ff', TE:'#ff8c4a', K:'#c084fc', DEF:'#f87171' };

  let html = `
  <style>
    .proj-board{display:flex;flex-direction:column;gap:5px;}
    .proj-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(10,21,32,0.85);border:1px solid var(--border-teal);border-radius:4px;cursor:pointer;transition:all 0.2s;}
    .proj-row:hover{border-color:var(--teal2);transform:translateX(2px);}
    .proj-row.rank-1{border-color:var(--gold);background:rgba(245,166,35,0.06);}
    .proj-row.rank-2{border-color:rgba(192,192,192,0.35);}
    .proj-row.rank-3{border-color:rgba(180,120,60,0.35);}
    .proj-rank{font-family:'Anton',sans-serif;font-size:18px;width:26px;text-align:center;flex-shrink:0;}
    .proj-rank.r1{color:var(--gold);}
    .proj-rank.r2{color:#c0c0c0;}
    .proj-rank.r3{color:#b4783c;}
    .proj-rank.rn{color:var(--muted);font-size:13px;}
    .proj-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--border-teal);flex-shrink:0;}
    .proj-avatar-ph{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid var(--border-teal);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:14px;color:var(--muted);flex-shrink:0;}
    .proj-info{flex:1;min-width:0;}
    .proj-name{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:1px;color:var(--chrome2);}
    .proj-picks{font-size:10px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;}
    .proj-scores{text-align:right;flex-shrink:0;}
    .proj-starter{font-family:'Anton',sans-serif;font-size:19px;color:var(--chrome2);}
    .proj-bench{font-size:10px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;}
    .proj-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-top:3px;}
    .proj-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--teal2));}
    .proj-legend{display:flex;gap:14px;font-family:'Barlow',sans-serif;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;justify-content:flex-end;}
    .proj-legend span{display:flex;align-items:center;gap:4px;}
  </style>
  <div class="proj-board">
    <div class="proj-legend">
      <span><strong style="color:var(--chrome2);">Score</strong> = 2026 season PPR projection (starters)</span>
      <span style="color:var(--muted);">+bench depth below</span>
    </div>`;

  const maxScore = teams[0]?.starterScore || 1;
  teams.forEach((team, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
    const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const rankStyle = rank <= 3 ? `r${rank}` : 'rn';
    const barPct = maxScore > 0 ? Math.round((team.starterScore / maxScore) * 100) : 0;
    const incomplete = team.picks < totalRounds;

    html += `<div class="proj-row ${rankClass}" onclick="openTeamProfile('${team.username}')">
      <div class="proj-rank ${rankStyle}">${rankLabel}</div>
      ${team.avatarUrl
        ? `<img class="proj-avatar" src="${team.avatarUrl}" crossorigin="anonymous" onerror="this.style.display='none'">`
        : `<div class="proj-avatar-ph">${team.displayName[0]}</div>`}
      <div class="proj-info">
        <div class="proj-name">${team.displayName}</div>
        <div class="proj-picks">${team.picks} / ${totalRounds} picks${incomplete ? ' · drafting' : ' · complete'}</div>
        <div class="proj-bar"><div class="proj-bar-fill" style="width:${barPct}%"></div></div>
      </div>
      <div class="proj-scores">
        <div class="proj-starter">${team.starterScore > 0 ? team.starterScore.toLocaleString() : '—'}</div>
        <div class="proj-bench">${team.benchScore > 0 ? '+' + team.benchScore.toLocaleString() + ' bench' : team.picks === 0 ? 'No picks yet' : 'bench TBD'}</div>
      </div>
    </div>`;
  });

  html += '</div>';
  boardEl.innerHTML = html;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
async function openTeamProfile(username) {
  activeTeam = username;
  activeTab = 'trades';
  const league = activeLeague;
  const t = getTeam(league, username);

  // Set header
  const img = document.getElementById('modal-avatar');
  const ph = document.getElementById('modal-avatar-ph');
  img.crossOrigin = 'anonymous';
  if (t.avatarUrl) {
    img.src = t.avatarUrl; img.style.display='block'; ph.style.display='none';
  } else {
    img.style.display='none'; ph.style.display='flex'; ph.textContent=t.displayName[0];
  }
  document.getElementById('modal-team-name').textContent = t.displayName.toUpperCase();
  document.getElementById('modal-username').textContent = `@${username} · ${league}`;

  // Show/hide startup tab based on league
  const startupTab = document.getElementById('tab-startup');
  if (startupTab) startupTab.style.display = STARTUP_LEAGUES.includes(league) ? 'block' : 'none';

  // Reset tabs
  document.getElementById('tab-trades').classList.add('active');
  document.getElementById('tab-startup').classList.remove('active');
  document.getElementById('tab-draft').classList.remove('active');
  document.getElementById('tab-hardware').classList.remove('active');

  // Show modal
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Load trades tab
  loadTradesTab(league, username);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-trades').classList.toggle('active', tab === 'trades');
  document.getElementById('tab-startup').classList.toggle('active', tab === 'startup');
  document.getElementById('tab-draft').classList.toggle('active', tab === 'draft');
  document.getElementById('tab-hardware').classList.toggle('active', tab === 'hardware');
  if (tab === 'trades') loadTradesTab(activeLeague, activeTeam);
  else if (tab === 'startup') loadStartupTab(activeLeague, activeTeam);
  else if (tab === 'draft') loadDraftTab(activeLeague, activeTeam);
  else if (tab === 'hardware') loadHardwareTab(activeLeague, activeTeam);
}

function switchTradeYear(tab, panelId) {
  // Deactivate all tabs and panels in modal-body
  const body = document.getElementById('modal-body');
  body.querySelectorAll('.trade-year-tab').forEach(t => t.classList.remove('active'));
  body.querySelectorAll('.trade-year-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  const panel = body.querySelector('#' + panelId);
  if (panel) panel.classList.add('active');
}

function playerHeadshotUrl(id) {
  return '/api/sleeper?player_img=' + encodeURIComponent(id);
}

function playerCard(id) {
  const p = playerCache[id];
  if (!p || (isNaN(Number(id)) && id.length <= 3)) {
    return '<div class="player-card"><div class="player-card-stripe DEF"></div>' +
      '<div class="player-card-photo" style="font-size:22px;">&#x1F6E1;</div>' +
      '<div class="player-card-body"><div class="player-card-pos DEF">DST</div>' +
      '<div class="player-card-name">' + id + '</div>' +
      '<div class="player-card-team">Defense</div></div></div>';
  }
  const name = p.full_name || ((p.first_name||'') + ' ' + (p.last_name||'')).trim() || id;
  const pos = p.position || 'OTHER';
  const nflTeam = p.team || '';
  const lastName = (p.last_name || name.split(' ').pop() || '').toUpperCase();
  const validPos = ['QB','RB','WR','TE','K','DEF'].includes(pos) ? pos : 'OTHER';
  const headshotUrl = playerHeadshotUrl(id);
  const posEmojis = {QB:'&#x1F3C8;',RB:'&#x1F3C3;',WR:'&#x26A1;',TE:'&#x1F4AA;',K:'&#x1F9B5;',DEF:'&#x1F6E1;'};
  const posEmoji = posEmojis[pos] || '&#x1F3C8;';
  return '<div class="player-card">' +
    '<div class="player-card-stripe ' + validPos + '"></div>' +
    '<div class="player-card-photo">' +
      '<img src="' + headshotUrl + '" crossorigin="anonymous" ' +
        'style="width:100%;height:100%;object-fit:cover;object-position:top center;" ' +
        'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:20px;">' + posEmoji + '</div>' +
    '</div>' +
    '<div class="player-card-body">' +
      '<div class="player-card-pos ' + validPos + '">' + pos + '</div>' +
      '<div class="player-card-name">' + lastName + '</div>' +
      '<div class="player-card-team">' + nflTeam + '</div>' +
    '</div></div>';
}

function pickCard(season, round, via) {
  const roundLabel = round === 1 ? '1ST' : round === 2 ? '2ND' : round === 3 ? '3RD' : round + 'TH';
  return '<div class="pick-card">' +
    '<div class="pick-card-stripe"></div>' +
    '<div class="pick-card-top">' +
      '<div class="pick-card-trophy">&#x1F3C6;</div>' +
      '<div class="pick-card-round-big">' + roundLabel + ' RD</div>' +
    '</div>' +
    '<div class="pick-card-body">' +
      '<div class="pick-card-season">' + season + '</div>' +
      '<div class="pick-card-via">' + (via || 'Own pick') + '</div>' +
    '</div></div>';
}

async function loadTradesTab(league, username) {
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading trades...</div></div>';

  const rosterMap = ROSTER_MAP[league];
  const rosterId = parseInt(Object.keys(rosterMap).find(k => rosterMap[k] === username));
  const leagueId = LEAGUE_IDS[league];
  const cacheKey = league + '_trades';

  // Fetch 2026 live trades
  if (!tradeCache[cacheKey]) {
    const allTrades = [];
    for (let week = 1; week <= 18; week++) {
      try {
        const res = await fetch(API('league/' + leagueId + '/transactions/' + week));
        if (!res.ok) break;
        const txns = await res.json();
        if (!txns || txns.length === 0) continue;
        allTrades.push(...txns.filter(t => t.type === 'trade' && t.status === 'complete'));
      } catch { break; }
    }
    tradeCache[cacheKey] = allTrades;
  }

  // Load players if not cached
  if (Object.keys(playerCache).length === 0) {
    try {
      const res = await fetch(API('players/nfl'));
      if (res.ok) { const data = await res.json(); Object.assign(playerCache, data); }
    } catch {}
  }

  function teamBadge(uname) {
    const td = getTeam(league, uname);
    const avHtml = td.avatarUrl
      ? '<img crossorigin="anonymous" src="' + td.avatarUrl + '" style="width:22px;height:22px;border-radius:50%;object-fit:cover;" onerror="this.style.display=\'none\'">'
      : '<div style="width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);font-family:\'Barlow\',sans-serif;">' + ((td.displayName||uname)[0]) + '</div>';
    return '<div class="trade-team-badge">' + avHtml + '<span>' + (td.displayName || uname) + '</span></div>';
  }

  function renderTradeCard(t, isLive) {
    const partnerNotes = t.partnerNotes || {};
    const partnerBadges = (t.partners||[]).map(p => {
      const note = partnerNotes[p];
      const badge = teamBadge(p.split(' (')[0]);
      if (note) {
        return badge + '<span style="font-size:9px;color:var(--muted);font-family:\'Barlow\',sans-serif;letter-spacing:1px;align-self:center;">(' + note + ')</span>';
      }
      return badge;
    }).join('');

    let html = '<div class="trade-card">' +
      '<div class="trade-date">' + (isLive ? t.date : t.date + ' · Wk ' + t.week) + '</div>' +
      (t.note ? '<div style="font-size:10px;color:var(--sunset);font-family:\'Barlow\',sans-serif;letter-spacing:1px;margin-bottom:6px;">⚑ ' + t.note + '</div>' : '') +
      '<div class="trade-parties" style="flex-wrap:wrap;row-gap:4px;">' + teamBadge(username) + '<span class="trade-vs">⇄</span>' + partnerBadges + '</div>';

    const received = isLive ? (t.myAdds||[]) : (t.received||[]);
    const sent = isLive ? (t.myDrops||[]) : (t.sent||[]);
    const picksIn = isLive ? (t.picksIn||[]) : (t.picksIn||[]);
    const picksOut = isLive ? (t.picksOut||[]) : (t.picksOut||[]);

    if (received.length || picksIn.length) {
      html += '<div class="trade-section-label">Received</div><div class="trade-cards-row">';
      received.forEach(pid => { html += playerCard(pid); });
      if (isLive) {
        picksIn.forEach(p => { html += pickCard(p.season, p.round, p.via || 'Own pick'); });
      } else {
        picksIn.forEach(p => { html += pickCard(p.s, p.r, p.via || 'Own pick'); });
      }
      html += '</div>';
    }
    if (sent.length || picksOut.length) {
      html += '<div class="trade-section-label">Sent</div><div class="trade-cards-row">';
      sent.forEach(pid => { html += playerCard(pid); });
      if (isLive) {
        picksOut.forEach(p => { html += pickCard(p.season, p.round, 'Own pick'); });
      } else {
        picksOut.forEach(p => { html += pickCard(p.s, p.r, p.via || 'Own pick'); });
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // ── Build 2026 live trades ────────────────────────────────────────────────────
  const myTrades2026raw = tradeCache[cacheKey].filter(t =>
    t.roster_ids && t.roster_ids.map(Number).includes(rosterId)
  );
  myTrades2026raw.sort((a,b) => b.created - a.created);

  const trades2026 = myTrades2026raw.map(trade => {
    const otherRosterIds = trade.roster_ids.filter(r => Number(r) !== rosterId);
    const myAdds = trade.adds ? Object.keys(trade.adds).filter(pid => parseInt(trade.adds[pid]) === rosterId) : [];
    const myDrops = trade.drops ? Object.keys(trade.drops).filter(pid => parseInt(trade.drops[pid]) === rosterId) : [];
    const picksIn = (trade.draft_picks||[]).filter(p => parseInt(p.owner_id) === rosterId).map(p => ({ season: p.season, round: p.round, via: p.roster_id !== rosterId ? 'via ' + getRosterUsername(league, p.roster_id) : 'Own pick' }));
    const picksOut = (trade.draft_picks||[]).filter(p => parseInt(p.previous_owner_id) === rosterId && parseInt(p.owner_id) !== rosterId).map(p => ({ season: p.season, round: p.round }));
    return {
      date: formatDate(trade.created),
      partners: otherRosterIds.map(r => getRosterUsername(league, r)),
      myAdds, myDrops, picksIn, picksOut,
    };
  });

  // ── Hardcoded seasons ─────────────────────────────────────────────────────────
  const trades2025 = (league === 'CFL' && TRADES_2025_CFL[username]) || [];
  const trades2024 = (league === 'CFL' && TRADES_2024_CFL[username]) || [];

  // Sort hardcoded newest first
  function sortNewest(arr) {
    return [...arr].sort((a,b) => new Date(b.date) - new Date(a.date));
  }

  const seasons = [
    { year: '2026', trades: trades2026, live: true },
    { year: '2025', trades: sortNewest(trades2025), live: false },
    { year: '2024', trades: sortNewest(trades2024), live: false },
  ].filter(s => s.trades.length > 0 || s.year === '2026');

  const totalTrades = seasons.reduce((n, s) => n + s.trades.length, 0);

  if (totalTrades === 0 && trades2026.length === 0) {
    body.innerHTML = '<div class="empty-state">No trades found for this team.</div>';
    return;
  }

  // Default active tab = most recent season with trades, fallback to 2026
  const defaultYear = (seasons.find(s => s.trades.length > 0) || seasons[0]).year;

  // Build tabbed UI
  let tabsHtml = '<div class="trade-year-tabs">';
  seasons.forEach(s => {
    const hasTrades = s.trades.length > 0;
    const isDefault = s.year === defaultYear;
    const liveTag = s.live && hasTrades ? ' <span style="font-size:9px;color:var(--teal2);letter-spacing:1px;">LIVE</span>' : '';
    const count = hasTrades ? ' <span style="font-size:10px;color:var(--muted);font-family:\'Barlow\',sans-serif;">(' + s.trades.length + ')</span>' : '';
    tabsHtml += '<div class="trade-year-tab' + (!hasTrades ? ' no-trades' : '') + (isDefault ? ' active' : '') + '" ' +
      (hasTrades ? 'onclick="switchTradeYear(this, \'panel-' + s.year + '\')"' : '') +
      '>' + s.year + count + liveTag + '</div>';
  });
  tabsHtml += '</div>';

  let panelsHtml = '';
  seasons.forEach(s => {
    const isDefault = s.year === defaultYear;
    panelsHtml += '<div class="trade-year-panel' + (isDefault ? ' active' : '') + '" id="panel-' + s.year + '">';
    if (s.trades.length === 0) {
      panelsHtml += '<div class="empty-state" style="padding:20px;">No trades yet this season.</div>';
    } else {
      s.trades.forEach(t => { panelsHtml += renderTradeCard(t, s.live); });
    }
    panelsHtml += '</div>';
  });

  body.innerHTML = tabsHtml + panelsHtml;
}


async function loadDraftTab(league, username) {
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading draft history...</div></div>';

  const rosterMap = ROSTER_MAP[league];
  const rosterId = parseInt(Object.keys(rosterMap).find(k => rosterMap[k] === username));
  const draftIds = DRAFT_IDS[league];

  if (!draftIds || draftIds.length === 0) {
    body.innerHTML = '<div class="empty-state">No rookie drafts found.</div>';
    return;
  }

  // Load players if not cached
  if (Object.keys(playerCache).length === 0) {
    try {
      const res = await fetch(API('players/nfl'));
      if (res.ok) { const data = await res.json(); Object.assign(playerCache, data); }
    } catch {}
  }

  function playerName(id) {
    const p = playerCache[id];
    if (!p) return id;
    return p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || id;
  }

  function playerMeta(id) {
    const p = playerCache[id];
    if (!p) return '';
    const parts = [p.position, p.team].filter(Boolean);
    return parts.join(' · ');
  }

  let html = '';
  for (const draftId of draftIds) {
    const cacheKey = `draft_${draftId}`;
    if (!draftCache[cacheKey]) {
      try {
        const res = await fetch(API(`draft/${draftId}/picks`));
        if (res.ok) draftCache[cacheKey] = await res.json();
        else draftCache[cacheKey] = [];
      } catch { draftCache[cacheKey] = []; }
    }
    const allPicks = draftCache[cacheKey];
    const myPicks = allPicks.filter(p => p.roster_id === rosterId);

    if (myPicks.length === 0) continue;

    const season = myPicks[0]?.metadata?.season || '2026';
    html += `<div class="draft-year-label">${season} Rookie Draft</div>`;

    myPicks.sort((a,b) => a.pick_no - b.pick_no);
    myPicks.forEach(pick => {
      const overall = pick.pick_no;
      const round = pick.round;
      const name = pick.metadata?.first_name
        ? `${pick.metadata.first_name} ${pick.metadata.last_name}`
        : playerName(pick.player_id);
      const pos = pick.metadata?.position || '';
      const team = pick.metadata?.team || '';
      html += `
        <div class="draft-pick-row">
          <div class="draft-pick-num">${overall}</div>
          <div class="draft-pick-info">
            <div class="draft-pick-player">${name}</div>
            <div class="draft-pick-meta">${[pos,team].filter(Boolean).join(' · ')}</div>
          </div>
          <div class="draft-pick-round">Rd ${round}</div>
        </div>`;
    });
  }

  if (!html) {
    body.innerHTML = '<div class="empty-state">No rookie draft picks found for this team.</div>';
    return;
  }
  body.innerHTML = html;
}

// ── STARTUP DRAFT TAB ────────────────────────────────────────────────────────
const STARTUP_DRAFT_IDS = {
  BIG12: '1354903444560809984',
};

async function loadStartupTab(league, username) {
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading roster...</div></div>';

  const rosterMap = ROSTER_MAP[league];
  const rosterId = parseInt(Object.keys(rosterMap).find(k => rosterMap[k] === username));
  const draftId = STARTUP_DRAFT_IDS[league];

  if (!draftId) { body.innerHTML = '<div class="empty-state">No startup draft found.</div>'; return; }

  if (Object.keys(playerCache).length === 0) {
    try { const res = await fetch(API('players/nfl')); if (res.ok) { const d = await res.json(); Object.assign(playerCache, d); } } catch {}
  }

  // Always fetch fresh — draft is live and picks change frequently
  let startupPicks = [];
  try {
    const res = await fetch(API('draft/' + draftId + '/picks'));
    startupPicks = res.ok ? await res.json() : [];
  } catch {}

  const allPicks = startupPicks;
  const myPicks = allPicks.filter(p => parseInt(p.roster_id) === rosterId).sort((a,b) => a.pick_no - b.pick_no);

  if (myPicks.length === 0) {
    body.innerHTML = '<div class="empty-state">No picks yet.<br><span style="font-size:12px;color:var(--muted);">Check back as the draft progresses.</span></div>';
    return;
  }

  const players = myPicks.map(pick => {
    const meta = pick.metadata || {};
    const pid = pick.player_id;
    const cached = playerCache[pid] || {};
    return {
      pid,
      name: meta.first_name ? meta.first_name + ' ' + meta.last_name : (cached.full_name || pid),
      lastName: (meta.last_name || cached.last_name || (cached.full_name||'').split(' ').pop() || pid).toUpperCase(),
      pos: meta.position || cached.position || '',
      nflTeam: meta.team || cached.team || '',
      round: pick.round,
      overall: pick.pick_no,
    };
  });

  // ── SLOT ASSIGNMENT ──────────────────────────────────────────────────────────
  const pools = { QB:[], RB:[], WR:[], TE:[], K:[], DEF:[] };
  players.forEach(p => { if (pools[p.pos]) pools[p.pos].push(p); });

  const take = (pos, n=1) => pools[pos].splice(0, n);

  const QB1  = take('QB',1)[0]  || null;
  const WR1  = take('WR',1)[0]  || null;
  const WR2  = take('WR',1)[0]  || null;
  const RB1  = take('RB',1)[0]  || null;
  const RB2  = take('RB',1)[0]  || null;
  const TE1  = take('TE',1)[0]  || null;

  // FLEX pool: remaining RB/WR/TE
  const flexPool = [...pools.RB, ...pools.WR, ...pools.TE];
  pools.RB = []; pools.WR = []; pools.TE = [];
  const FLEX1 = flexPool.shift() || null;
  const FLEX2 = flexPool.shift() || null;
  const FLEX3 = flexPool.shift() || null;

  // SuperFlex: QB first then any flex
  const sfPool = [...pools.QB, ...flexPool];
  pools.QB = [];
  const SF = sfPool.shift() || null;
  const remainingFlex = sfPool;

  const K1   = take('K',1)[0]   || null;
  const DEF1 = take('DEF',1)[0] || null;

  // Bench = everyone left, sorted by round
  const usedPids = new Set([QB1,WR1,WR2,RB1,RB2,TE1,FLEX1,FLEX2,FLEX3,SF,K1,DEF1].filter(Boolean).map(p=>p.pid));
  const bench = players.filter(p => !usedPids.has(p.pid));

  // ── RENDER ───────────────────────────────────────────────────────────────────
  const POS_COLOR = { QB:'#e5c440', RB:'#4ae0a0', WR:'#4ab0ff', TE:'#ff8c4a', K:'#c084fc', DEF:'#f87171' };

  function fieldSlot(player, label, color) {
    const c = color || (player ? POS_COLOR[player.pos] || '#fff' : 'rgba(255,255,255,0.2)');
    if (!player) return `<div class="fs empty"><div class="fs-label" style="color:${c}">${label}</div><div class="fs-circle" style="border-color:${c}20"><span style="color:${c};font-family:'Anton',sans-serif;font-size:10px;letter-spacing:1px;">${label}</span></div><div class="fs-name" style="opacity:0.2">—</div></div>`;
    const img = '/api/sleeper?player_img=' + encodeURIComponent(player.pid);
    return `<div class="fs filled"><div class="fs-label" style="color:${c}">${label}</div><div class="fs-circle" style="border-color:${c}">
      <img src="${img}" crossorigin="anonymous" style="width:100%;height:100%;object-fit:cover;object-position:top;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:13px;">👤</div>
    </div><div class="fs-name">${player.lastName}</div><div class="fs-team">${player.nflTeam}</div></div>`;
  }

  function oline(pos) {
    // Static OL slot — circle with position label, no player
    return `<div class="fs ol-slot"><div class="fs-circle ol-circle"><span>${pos}</span></div></div>`;
  }

  function benchRow(player) {
    const c = POS_COLOR[player.pos] || '#fff';
    const img = '/api/sleeper?player_img=' + encodeURIComponent(player.pid);
    return `<div class="bench-row">
      <div class="bench-round">Rd ${player.round}</div>
      <div class="bench-pick">#${player.overall}</div>
      <img src="${img}" crossorigin="anonymous" class="bench-headshot" onerror="this.style.display='none'">
      <div class="bench-pos" style="color:${c}">${player.pos}</div>
      <div class="bench-name">${player.name}</div>
      <div class="bench-team">${player.nflTeam}</div>
    </div>`;
  }

  const totalPicks = myPicks.length;

  body.innerHTML = `
  <style>
    .su-wrap{padding:4px 0 12px;}
    .su-progress-row{display:flex;justify-content:space-between;font-family:'Barlow',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:5px;}
    .su-progress-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-bottom:12px;}
    .su-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:2px;}

    /* FIELD */
    .su-field{background:linear-gradient(180deg,rgba(0,55,20,0.4),rgba(0,35,10,0.25));border:1px solid rgba(0,168,156,0.18);border-radius:6px;padding:14px 4px 18px;position:relative;overflow:hidden;margin-bottom:14px;}
    .su-field::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(255,255,255,0.025) 38px,rgba(255,255,255,0.025) 39px);pointer-events:none;}
    .su-row{display:flex;align-items:flex-start;justify-content:center;gap:3px;margin-bottom:10px;position:relative;z-index:1;}
    .su-row.qb-row{margin-bottom:6px;}
    .su-row.bottom-row{margin-top:4px;}

    /* FIELD SLOT */
    .fs{display:flex;flex-direction:column;align-items:center;gap:2px;width:46px;text-align:center;flex-shrink:0;}
    .fs-label{font-family:'Anton',sans-serif;font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;min-height:12px;}
    .fs-circle{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .fs.filled .fs-circle{border-width:2px;}
    .fs-name{font-family:'Anton',sans-serif;font-size:8px;letter-spacing:1px;color:var(--chrome2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46px;}
    .fs-team{font-size:7px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;}

    /* OL slots — extra compact */
    .ol-slot .fs-circle{width:28px;height:28px;border-color:rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);}
    .ol-slot .fs-circle span{font-family:'Anton',sans-serif;font-size:7px;letter-spacing:0px;color:rgba(255,255,255,0.25);}
    .ol-slot{width:30px;}
    .ol-slot .fs-label{display:none;}

    /* Mobile: compress top row so WR1/WR2 fit */
    @media(max-width:480px){
      .su-row{gap:3px;}
      .fs{width:44px;}
      .fs-circle{width:38px;height:38px;}
      .fs-name{font-size:8px;max-width:44px;}
      .ol-slot{width:28px;}
      .ol-slot .fs-circle{width:26px;height:26px;margin-top:6px;}
      .ol-slot .fs-circle span{font-size:7px;}
      .su-field{padding:10px 4px 14px;}
    }

    /* divider */
    .su-divider{display:flex;align-items:center;gap:6px;margin:2px 12px 8px;opacity:0.5;position:relative;z-index:1;}
    .su-divider-line{flex:1;height:1px;background:var(--teal);}
    .su-divider-text{font-size:8px;letter-spacing:3px;color:var(--teal2);font-family:'Barlow',sans-serif;text-transform:uppercase;white-space:nowrap;}

    /* BENCH */
    .su-bench-label{font-size:10px;letter-spacing:3px;color:var(--muted);font-family:'Barlow',sans-serif;text-transform:uppercase;margin-bottom:8px;}
    .bench-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(10,21,32,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:3px;margin-bottom:4px;}
    .bench-round{font-family:'Anton',sans-serif;font-size:10px;color:var(--orange2);letter-spacing:1px;width:30px;flex-shrink:0;}
    .bench-pick{font-size:9px;color:var(--muted);font-family:'Barlow',sans-serif;width:24px;flex-shrink:0;}
    .bench-headshot{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.08);flex-shrink:0;}
    .bench-pos{font-family:'Anton',sans-serif;font-size:10px;letter-spacing:1px;width:28px;flex-shrink:0;}
    .bench-name{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--chrome2);flex:1;}
    .bench-team{font-size:10px;color:var(--muted);font-family:'Barlow',sans-serif;letter-spacing:1px;}
  </style>

  <div class="su-wrap">
    <div class="su-progress-row">
      <span>2026 Startup Draft</span>
      <span>${totalPicks} / 33 rounds picked</span>
    </div>
    <div class="su-progress-bar"><div class="su-progress-fill" style="width:${Math.round(totalPicks/33*100)}%"></div></div>

    <div class="su-field">
      <!-- Row 1: WR1 · FLEX · OL × 5 · TE · WR2 -->
      <div class="su-row">
        ${fieldSlot(WR1, 'WR1', POS_COLOR.WR)}
        ${fieldSlot(FLEX1, 'FLEX')}
        ${oline('LT')}${oline('LG')}${oline('C')}${oline('RG')}${oline('RT')}
        ${fieldSlot(TE1, 'TE', POS_COLOR.TE)}
        ${fieldSlot(WR2, 'WR2', POS_COLOR.WR)}
      </div>

      <!-- Row 2: QB (centered) -->
      <div class="su-row qb-row">
        ${fieldSlot(QB1, 'QB', POS_COLOR.QB)}
      </div>

      <!-- Row 3: RB2 -->
      <div class="su-row">
        ${fieldSlot(RB2, 'RB2', POS_COLOR.RB)}
      </div>

      <!-- Row 4: RB1 -->
      <div class="su-row">
        ${fieldSlot(RB1, 'RB1', POS_COLOR.RB)}
      </div>

      <div class="su-divider"><div class="su-divider-line"></div><div class="su-divider-text">Flex · SuperFlex · K · DEF</div><div class="su-divider-line"></div></div>

      <!-- Row 5: FLEX · FLEX · FLEX · SF · K · DEF -->
      <div class="su-row bottom-row">
        ${fieldSlot(FLEX2, 'FLEX')}
        ${fieldSlot(FLEX3, 'FLEX')}
        ${fieldSlot(SF,    'SF', '#f0c060')}
        ${fieldSlot(K1,    'K',  POS_COLOR.K)}
        ${fieldSlot(DEF1,  'DEF',POS_COLOR.DEF)}
      </div>
    </div>

    ${bench.length > 0 ? `
    <div class="su-bench-label">Bench · ${bench.length} players</div>
    ${bench.map(p => benchRow(p)).join('')}` : ''}
  </div>`;
}

function loadHardwareTab(league, username) {
  const body = document.getElementById('modal-body');
  const teamHardware = (HARDWARE[league] && HARDWARE[league][username]) || [];

  if (teamHardware.length === 0) {
    const t = getTeam(league, username);
    body.innerHTML = `
      <div class="hardware-empty">
        <div class="hardware-empty-icon">🔩</div>
        <div><strong style="color:var(--chrome);">${t.displayName}</strong> hasn't won any hardware yet.</div>
        <div style="margin-top:6px;font-size:12px;">No rings. No banners. Just motivation.</div>
      </div>`;
    return;
  }

  const championships = teamHardware.filter(h => h.type === 'championship');
  const divisions = teamHardware.filter(h => h.type === 'division');
  let html = '';

  if (championships.length > 0) {
    html += '<div class="hardware-section-label">🏆 Championships</div><div class="hardware-grid">';
    championships.forEach(h => {
      html += `<div class="hardware-card" onclick="openHwLightbox('${h.image}')">
        <img src="${h.image}" alt="${h.label}" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="hardware-champ-badge">CHAMP</div>
        <div class="hardware-card-label">${h.label}</div>
      </div>`;
    });
    html += '</div>';
  }

  if (divisions.length > 0) {
    html += '<div class="hardware-section-label">🎖️ Division Titles</div><div class="hardware-grid">';
    divisions.forEach(h => {
      html += `<div class="hardware-card" onclick="openHwLightbox('${h.image}')">
        <img src="${h.image}" alt="${h.label}" loading="lazy" onerror="this.parentElement.style.display='none'">
        <div class="hardware-card-label">${h.label}</div>
      </div>`;
    });
    html += '</div>';
  }

  body.innerHTML = html;
}

function openHwLightbox(src) {
  document.getElementById('hw-lightbox-img').src = src;
  document.getElementById('hw-lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeHwLightbox() {
  document.getElementById('hw-lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeHwLightbox();
});
